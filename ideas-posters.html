<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پوستر ایده‌ها — پیمان</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=vazirmatn:400,500,700,800,900|jetbrains-mono:500,600,700" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0A1A22;--ink-2:#102832;
  --text:#ECE7DC;--muted:#92ABB2;
  --amber:#FFB627;--coral:#FF6B4A;--mint:#46E0B8;--sky:#6FC8FF;--lavender:#B9A6FF;
  --line:rgba(236,231,220,0.14);--line-soft:rgba(236,231,220,0.07);
}
html,body{background:#040B0F;color:var(--text);font-family:'Vazirmatn',Tahoma,sans-serif;min-height:100vh}
body{display:flex;flex-direction:column;align-items:center;padding:22px 14px 40px;gap:16px}
.mono{font-family:'JetBrains Mono',monospace;direction:ltr;unicode-bidi:isolate}

.toolbar{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.toolbar-title{font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;direction:ltr}
.toolbar-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber);background:rgba(255,182,39,0.1);border:1px solid rgba(255,182,39,0.3);padding:4px 10px;border-radius:100px}

/* ===== poster ===== */
.stage{width:100%;max-width:520px;aspect-ratio:1/1;position:relative}
.poster{position:absolute;inset:0;border-radius:22px;overflow:hidden;background:var(--ink);
  display:flex;flex-direction:column;
  box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);border:1px solid var(--line)}

/* decorative top texture, subtle so it never fights legibility */
.p-texture{position:absolute;inset:0;pointer-events:none;z-index:0}
.tex-a{background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:46px 46px;mask-image:radial-gradient(ellipse 70% 55% at 78% 12%,black 20%,transparent 100%)}
.tex-b{background-image:repeating-linear-gradient(-45deg,var(--line-soft) 0 1px,transparent 1px 24px);
  mask-image:radial-gradient(ellipse 65% 50% at 78% 12%,black 20%,transparent 100%)}
.tex-c{background:radial-gradient(circle at 82% 10%,var(--accent-glow) 0%,transparent 55%)}
.ghost-ring{position:absolute;top:-60px;left:-60px;width:220px;height:220px;border-radius:50%;
  border:2px solid var(--accent);opacity:0.16;pointer-events:none;z-index:0}

/* top row — extra top/side clearance so IG's own carousel/video badge (top-right, in both feed and grid) never sits on our text */
.p-top{position:relative;z-index:2;padding:48px 40px 0;display:flex;align-items:center;justify-content:space-between}
.p-brand{display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;direction:ltr}
.p-brand .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.p-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px}

/* main content — this is what must survive shrinking to a grid thumbnail */
.p-main{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px;padding:10px 40px}
.p-title{font-size:clamp(32px,8vw,45px);font-weight:900;line-height:1.2;color:var(--text);letter-spacing:-0.5px}
.p-line{font-size:clamp(14.5px,3.5vw,16.5px);line-height:1.7;color:rgba(236,231,220,0.78);max-width:94%}

/* bottom solid color band — the main thumbnail identity element */
.p-band{position:relative;z-index:2;background:var(--accent);color:#0A1408;
  padding:28px 40px 40px;display:flex;align-items:center;justify-content:flex-start;gap:12px}
.p-band-status{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  display:flex;align-items:center;gap:7px}
.p-band-status .sd{width:7px;height:7px;border-radius:50%;background:#0A1408;opacity:0.55}

@media (max-width:380px){.p-top{padding:40px 30px 0}.p-main{padding:8px 30px}.p-band{padding:22px 30px 32px}}
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">peyman · ideas · posters</span>
  <span class="toolbar-count mono" id="counter">01 / 35</span>
</div>

<div class="stage">
  <div class="poster" id="poster"></div>
</div>

<div class="controls" style="width:100%;max-width:520px;display:flex;align-items:center;justify-content:center;gap:14px">
  <button id="prevBtn" style="width:46px;height:46px;border-radius:50%;border:1px solid var(--line);background:var(--ink-2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 6l-6 6 6 6"/></svg>
  </button>
  <span class="mono" id="jumpLabel" style="font-size:12px;color:var(--muted);min-width:70px;text-align:center">1</span>
  <button id="nextBtn" style="width:46px;height:46px;border-radius:50%;border:1px solid var(--line);background:var(--ink-2);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg>
  </button>
</div>

<p style="max-width:520px;text-align:center;font-size:12px;color:var(--muted);line-height:1.8;padding:0 10px">
فقط از کادر مربعی بالا <b style="color:var(--amber)">اسکرین‌شات</b> بگیر. با فلش‌های صفحه‌کلید هم می‌تونی جابه‌جا بشی.
</p>

<script>
const IDEAS = [{"title": "آسمانه ✈ — سامانه استیفای حقوق مسافران هوایی ایران", "line": "هر ساله میلیون‌ها مسافر ایرانی به دلیل تأخیر، لغو پرواز یا ممانعت از…", "status": "live"}, {"title": "قیمت‌گذاری گروهی زنده برای تور", "line": "یه مکانیزم قیمت‌گذاری پلکانی زنده برای تورهای گروهی: هرچقدر آدم‌های…", "status": "wip"}, {"title": "موتور جستجوی سفر بر اساس بودجه", "line": "به‌جای ساخت دیتابیس بسته خودش، این موتور دقیقاً مثل یه سرچ‌انجین عمل…", "status": "idea"}, {"title": "دستیار هوشمند برنامه‌ریزی سفر", "line": "یه چت‌بات فارسی که با استفاده از Amadeus API و مدل‌های زبانی بزرگ،…", "status": "wip"}, {"title": "پلتفرم بورس سفر ایرانی‌ها", "line": "مارکت‌پلیسی که مسافرین ایرانی بتونن بلیط، هتل، یا تور نیمه‌کاره‌شون رو…", "status": "idea"}, {"title": "مقایسه قیمت پرواز با NDC", "line": "موتور جستجوی پرواز که از NDC مستقیماً با ایرلاین‌ها ارتباط میگیره و…", "status": "idea"}, {"title": "سیستم مدیریت تجربه گردشگر", "line": "یه SaaS برای هتل‌ها و اقامتگاه‌های ایرانی که بتونن چرخه کامل مهمان رو…", "status": "wip"}, {"title": "داده‌کاوی الگوهای سفر ایرانیان خارج", "line": "تحلیل داده سفر ایرانیان مقیم خارج برای شناخت الگوهای بازگشت، مقصدهای…", "status": "idea"}, {"title": "نرخ‌گذاری اتوماتیک بلیط بر اساس نیاز بازار", "line": "موتور نرخ‌گذاری هوشمندی که قیمت بلیط‌های هواپیما رو بر اساس تقاضای…", "status": "live"}, {"title": "پیشنهاد چارتر مردن مسیر پروازی با AI", "line": "سیستمی که بر اساس شاخص‌های عملیاتی (نرخ پر شدن صندلی، فرکانس پرواز،…", "status": "idea"}, {"title": "ربات اتومات انتقال اطلاعات بلیط از سپهر/مقیم به نیرا", "line": "آژانس‌های هواپیمایی ایران بلیط رو در سامانه‌های سپهر یا مقیم صادر…", "status": "wip"}, {"title": "Amadeus Navitaire Stratos — پلتفرم رتیلینگ هوشمند", "line": "آمادئوس یه پلتفرم ابری بومی به اسم Navitaire Stratos راه‌اندازی کرده که…", "status": "live"}, {"title": "Amadeus Max — لایه دستیار AI روی تمام محصولات", "line": "آمادئوس یه لایه AI به اسم \"Amadeus Max\" راه‌اندازی کرده که مثل یه…", "status": "live"}, {"title": "ترکیش ایر · سیستم بیومتریک پرواز داخلی", "line": "ترکیش ایر یه سیستم سفر بیومتریک راه‌اندازی کرده که مسافران ثبت‌نامی…", "status": "live"}, {"title": "ترکیش ایر · چت‌بات چندوجهی مسافر", "line": "ترکیش ایر در حال استقرار یک چت‌بات چندوجهی (متن + صدا + تصویر) هست که…", "status": "live"}, {"title": "ترکیش ایر · مرکز داده‌ی استانبول و ستون دیجیتال", "line": "ترکیش ایر داره یه مرکز داده‌ی اختصاصی در استانبول می‌سازه که ستون فقرات…", "status": "live"}, {"title": "مقاله: تقاضاپیشی با ترکیب ML و مدل تحلیلی", "line": "در تیم آمادئوس روی ترکیب مدل‌های تحلیلی کلاسیک Revenue Management با…", "status": "live"}, {"title": "مقاله: قیمت‌گذاری پویا در دقایق پایانی — Reinforcement Learning", "line": "یکی از حوزه‌هایی که در آمادئوس روش کار کردیم، قیمت‌گذاری پویا در ساعات…", "status": "wip"}, {"title": "مقاله: آیا RMS از تحول Offer/Order جان سالم به در می‌بره؟", "line": "یکی از بحث‌های مهمی که در آمادئوس روش کار کردیم اینه که وقتی ایرلاین‌ها…", "status": "wip"}, {"title": "موتور خلاصه‌سازی بلیط با GenAI برای آژانس‌های ایران", "line": "ابزاری که اپراتورهای آژانس بتونن فایل PNR یا تصویر بلیط رو آپلود کنن و…", "status": "live"}, {"title": "داشبورد real-time مانیتورینگ نرخ رقبا", "line": "داشبوردی که نرخ بلیط تمام رقبا روی مسیرهای هدف رو در real-time رصد…", "status": "live"}, {"title": "پیش‌بینی نرخ بلیط با LSTM برای مسافر", "line": "ابزاری برای مسافر که قیمت بلیط رو روی یه مسیر مشخص رصد کنه و با مدل…", "status": "live"}, {"title": "سیستم تشخیص تقلب در صدور بلیط با ML", "line": "مدلی که الگوهای غیرعادی در صدور بلیط رو شناسایی می‌کنه: ترنسکشن‌های بیش…", "status": "idea"}, {"title": "پنل تحلیل سودآوری مسیر برای آژانس‌های کوچک", "line": "داشبوردی که آژانس‌های کوچک بتونن بفهمن کدام مسیرها، کدام ایرلاین‌ها، و…", "status": "idea"}, {"title": "موتور بسته‌بندی هوشمند بلیط + هتل + ترانسفر", "line": "موتوری که از داده‌های تاریخی رزرو، مقصد، و پروفایل مشتری، بسته‌های…", "status": "idea"}, {"title": "سیستم هشدار اتوماتیک شرایط استرداد بلیط", "line": "سیستمی که تمام بلیط‌های صادره یه آژانس رو رصد می‌کنه و قبل از رسیدن به…", "status": "idea"}, {"title": "داشبورد BI عملکرد اپراتورهای آژانس", "line": "داشبوردی برای مدیران آژانس که عملکرد هر اپراتور رو بر اساس تعداد بلیط…", "status": "idea"}, {"title": "موتور اتوماتیک گزارش BSP و تطبیق مالی", "line": "ابزاری که گزارش‌های BSP (Billing and Settlement Plan) IATA رو به صورت…", "status": "idea"}, {"title": "پیشنهاد مسیر جایگزین در زمان ایرراپشن", "line": "وقتی یه پرواز کنسل یا دیلی می‌شه، سیستم فوری بهترین مسیرهای جایگزین رو…", "status": "idea"}, {"title": "API پیش‌بینی تقاضای مسیر برای آژانس‌های حجم‌دار", "line": "یه API که آژانس‌های حجم‌دار بتونن SubscrIbe کنن و پیش‌بینی تقاضای…", "status": "idea"}, {"title": "سیستم اتوماسیون QC بلیط قبل از صدور نهایی", "line": "قبل از اینکه اپراتور دکمه‌ی «صدور» رو بزنه، یه لایه QC خودکار روی PNR…", "status": "idea"}, {"title": "پلتفرم وفاداری white-label برای آژانس‌های مستقل", "line": "ایرلاین‌های بزرگ سیستم‌های وفاداری پیچیده دارن — آژانس‌های مستقل ندارن.", "status": "idea"}, {"title": "سامانه آنلاین رزرو هتل‌های نجف و کربلا", "line": "در عراق برخلاف ایران (که اقامت۲۴ و امثالش رزرو هتل رو حل کردن) هیچ…", "status": "idea"}, {"title": "پلتفرم سفرساز انفرادی زیارت — بدون کاروان", "line": "اکثر زائران ایرانی به نجف و کربلا فقط از طریق کاروان‌های گروهی می‌رن —…", "status": "idea"}, {"title": "پلتفرم چارتر و مدیریت اسناد حمل اموات به نجف", "line": "انتقال پیکر متوفی برای تدفین در قبرستان وادی‌السلام نجف یه بازار واقعی…", "status": "idea"}];

const ACCENTS = ['var(--amber)','var(--coral)','var(--mint)','var(--sky)','var(--lavender)'];
const ACCENT_GLOWS = {
  'var(--amber)':'rgba(255,182,39,0.28)',
  'var(--coral)':'rgba(255,107,74,0.26)',
  'var(--mint)':'rgba(70,224,184,0.26)',
  'var(--sky)':'rgba(111,200,255,0.26)',
  'var(--lavender)':'rgba(185,166,255,0.26)',
};

const STATUS_MAP = {
  wip:  'در حال اجرا',
  idea: 'ایده‌پردازی',
};

let idx = 0;
const posterEl = document.getElementById('poster');
const counterEl = document.getElementById('counter');
const jumpEl = document.getElementById('jumpLabel');

function pad(n){ return String(n).padStart(2,'0'); }

function render(i){
  const item = IDEAS[i];
  const accent = ACCENTS[i % ACCENTS.length];
  const texClass = 'tex-' + ['a','b','c'][i % 3];
  const statusLabel = STATUS_MAP[item.status] || STATUS_MAP.idea;

  posterEl.style.setProperty('--accent', accent);
  posterEl.style.setProperty('--accent-glow', ACCENT_GLOWS[accent]);

  posterEl.innerHTML = `
    <div class="p-texture ${texClass}"></div>
    <div class="ghost-ring"></div>
    <div class="p-top">
      <div class="p-brand"><span class="dot"></span>PEYMAN · IDEAS</div>
      <div class="p-num">IDEA · ${pad(i+1)}</div>
    </div>
    <div class="p-main">
      <div class="p-title">${item.title}</div>
      <div class="p-line">${item.line}</div>
    </div>
    <div class="p-band">
      <div class="p-band-status"><span class="sd"></span>${statusLabel}</div>
    </div>
  `;

  counterEl.textContent = `${pad(i+1)} / ${IDEAS.length}`;
  jumpEl.textContent = `${i+1}`;
}

function go(delta){
  idx = (idx + delta + IDEAS.length) % IDEAS.length;
  render(idx);
}

document.getElementById('prevBtn').addEventListener('click', () => go(-1));
document.getElementById('nextBtn').addEventListener('click', () => go(1));
document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') go(1);
  if(e.key === 'ArrowRight') go(-1);
});

render(idx);
</script>
</body>
</html>
