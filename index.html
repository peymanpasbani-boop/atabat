<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>سفرساز شخصی</title>

<!-- فونت فارسی شیک -->
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    font-family: "Vazirmatn", sans-serif;
    background: #f5f7fa;
    color: #1e1e1e;
  }

  /* HERO */
  .hero {
    height: 100vh;
    background: linear-gradient(135deg, #0f3a52, #0a2a3d);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  .hero h1 {
    font-size: 26px;
    margin-bottom: 10px;
  }

  .hero p {
    max-width: 500px;
    font-size: 14px;
    opacity: 0.85;
    line-height: 1.8;
  }

  .scroll {
    margin-top: 30px;
    font-size: 12px;
    opacity: 0.7;
  }

  /* SECTION */
  section {
    min-height: 100vh;
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .box {
    background: white;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    max-width: 400px;
    width: 100%;
    text-align: center;
  }

  .step {
    font-size: 13px;
    opacity: 0.6;
    margin-bottom: 10px;
  }

  h2 {
    font-size: 18px;
    margin-bottom: 20px;
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-family: inherit;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #2ecc71;
    color: white;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
  }

  .btn:hover {
    background: #27ae60;
  }

</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>✈️ سفر را خودت طراحی کن</h1>
  <p>
    ما دیگر تور آماده نمی‌فروشیم.  
    اینجا شما تصمیم می‌گیری کِی بروی، کجا بروی و چگونه سفر کنی.
  </p>
  <div class="scroll">⬇️ اسکرول کن و سفر خودت رو بساز</div>
</div>

<!-- STEP 1 -->
<section>
  <div class="box">
    <div class="step">مرحله 1</div>
    <h2>مقصد سفر</h2>
    <input placeholder="مثلاً: نجف / کربلا / مشهد">
  </div>
</section>

<!-- STEP 2 -->
<section>
  <div class="box">
    <div class="step">مرحله 2</div>
    <h2>تاریخ سفر</h2>
    <input type="date">
    <input type="number" placeholder="چند روز سفر؟">
  </div>
</section>

<!-- STEP 3 -->
<section>
  <div class="box">
    <div class="step">مرحله 3</div>
    <h2>نوع سفر</h2>
    <select>
      <option>هوایی</option>
      <option>زمینی</option>
    </select>

    <select>
      <option>درِ منزل</option>
      <option>فرودگاه</option>
      <option>ترمینال</option>
    </select>

    <button class="btn">ثبت سفر</button>
  </div>
</section>

</body>
</html>
