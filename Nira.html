<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nira Training Simulator</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    height: 100vh;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 55px;
    background: #111827;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    border-bottom: 1px solid #1f2937;
    z-index: 10;
}

header a {
    color: #38bdf8;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
}

/* HAMBURGER */
.menu-btn {
    display: none;
    background: none;
    border: 1px solid #334155;
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    background: #111827;
    padding-top: 60px;
    border-left: 1px solid #1f2937;
    transition: transform 0.3s ease;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    background: none;
    border: none;
    color: #e2e8f0;
    text-align: right;
    cursor: pointer;
    border-bottom: 1px solid #1f2937;
    font-size: 14px;
}

.sidebar button:hover {
    background: #1e293b;
}

/* MAIN */
.main {
    flex: 1;
    padding: 80px 20px 20px 20px;
    overflow-y: auto;
}

.card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 15px;
    max-width: 850px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #0f172a;
    border: 1px solid #334155;
    color: white;
    border-radius: 6px;
}

button.run {
    margin-top: 10px;
    padding: 10px 12px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
    width: 100%;
}

pre {
    background: #0f172a;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #334155;
    white-space: pre-wrap;
    border-radius: 6px;
}

.tooltip {
    margin-top: 10px;
    font-size: 12px;
    color: #94a3b8;
}

/* MOBILE UX */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    .menu-btn {
        display: block;
    }

    .sidebar {
        position: fixed;
        right: 0;
        top: 55px;
        height: 100%;
        transform: translateX(100%);
        z-index: 20;
        width: 260px;
    }

    .sidebar.open {
        transform: translateX(0);
    }

    .main {
        padding: 80px 10px 10px 10px;
    }
}
</style>
</head>

<body>

<header>
    <a href="http://nirasoft.ir/t/" target="_blank">Nira Training Portal</a>
    <button class="menu-btn" onclick="toggleMenu()">منو</button>
</header>

<div class="sidebar" id="sidebar">
    <button onclick="loadLesson('availability')">دسترسی پرواز (AV / AY)</button>
    <button onclick="loadLesson('booking')">رزرو (SK)</button>
    <button onclick="loadLesson('ticketing')">صدور بلیت (TCC / CRD)</button>
    <button onclick="loadLesson('reports')">گزارش‌ها (DGS)</button>
    <button onclick="loadLesson('tools')">ابزار سیستم</button>
</div>

<div class="main">
    <div id="content" class="card">
        <h2>به شبیه‌ساز آموزشی Nira خوش آمدید</h2>
        <p>از منوی سمت راست یک بخش را انتخاب کنید.</p>
    </div>
</div>

<script>
const lessons = {
    availability: {
        title: "AV / AY - نمایش موجودی پرواز",
        desc: "این دستور برای مشاهده پروازهای موجود بین دو شهر استفاده می‌شود. AY حالت عمومی و AV حالت مستقیم ایرلاین است.",
        cmd: "AY JFK LHR 12JUL",
        tooltip: "نمایش تعداد صندلی‌های موجود در کلاس‌های پروازی مختلف.",
        run: () => {
            return `نتیجه جستجو:
-------------------
مسیر: JFK → LHR
تاریخ: 12JUL

Y: 9 صندلی
J: 4 صندلی
F: 2 صندلی

وضعیت: موجودی لحظه‌ای`;
        }
    },

    booking: {
        title: "SK - رزرو صندلی",
        desc: "برای رزرو یک صندلی در پرواز استفاده می‌شود و بعد از بررسی موجودی انجام می‌گیرد.",
        cmd: "SK 1 BA117 Y 12JUL JFKLHR",
        tooltip: "ایجاد سگمنت و رزرو صندلی برای مسافر.",
        run: () => {
            return `رزرو انجام شد:
-------------------
پرواز: BA117
کلاس: Y
وضعیت: تایید شد
PNR: NIRA42X`;
        }
    },

    ticketing: {
        title: "TCC / CRD - محاسبه و صدور بلیت",
        desc: "برای محاسبه قیمت نهایی بلیت همراه با مالیات استفاده می‌شود.",
        cmd: "TCC JFK LHR Y",
        tooltip: "محاسبه کرایه نهایی شامل مالیات و هزینه پایه.",
        run: () => {
            return `جزئیات قیمت:
-------------------
کرایه پایه: 450 USD
مالیات: 120.50 USD
مجموع: 570.50 USD`;
        }
    },

    reports: {
        title: "DGS - گزارش فروش روزانه",
        desc: "نمایش گزارش فروش، استرداد و بلیت‌های صادر شده.",
        cmd: "DGS 27JUN",
        tooltip: "نمایش عملکرد فروش روزانه آژانس.",
        run: () => {
            return `گزارش روزانه:
-------------------
تعداد بلیت: 18
فروش: 9,450 USD
استرداد: 2
خالص: 9,100 USD`;
        }
    },

    tools: {
        title: "ابزارهای سیستم",
        desc: "بررسی وضعیت سیستم و ابزارهای مدیریتی.",
        cmd: "INFO SYS",
        tooltip: "وضعیت سرور و سیستم شبیه‌ساز.",
        run: () => {
            return `وضعیت سیستم:
-------------------
Nira Core: فعال
API: روشن
Training Mode: فعال
Latency: 12ms`;
        }
    }
};

function loadLesson(key) {
    const l = lessons[key];

    document.getElementById("content").innerHTML = `
        <h2>${l.title}</h2>
        <p>${l.desc}</p>

        <input id="cmdInput" value="${l.cmd}" />

        <button class="run" onclick="runCommand('${key}')">اجرای دستور</button>

        <div class="tooltip">راهنمای هوشمند: ${l.tooltip}</div>

        <pre id="output">در انتظار اجرا...</pre>
    `;

    if (window.innerWidth < 768) {
        document.getElementById("sidebar").classList.remove("open");
    }
}

function runCommand(key) {
    const input = document.getElementById("cmdInput").value;
    document.getElementById("output").textContent = lessons[key].run(input);
}

function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
}
</script>

</body>
</html>
