<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>کارتابل نرخ‌گذاری</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
  :root{
    --bg:#F2F2F7; --elevated:#FFFFFF; --sep:#E3E3E8; --sep-soft:#ECECF1;
    --label:#1C1C1E; --label-2:#6C6C70; --label-3:#AEAEB4;
    --blue:#0A84FF; --green:#30B855; --red:#FF3B30; --orange:#FF9500;
    --fill:#EDEDF2; --amber:#F2A73B;
    --violet:#7C6FF0; --violet-2:#5B4FE0; --violet-ink:#4B3FCB;
    --radius:18px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    background:#DCDCE2;
    font-family:"Vazirmatn", Tahoma, "Segoe UI", sans-serif;
    font-optical-sizing:auto;
    color:var(--label);
    display:flex; align-items:flex-start; justify-content:center;
  }
  button, input{ font-family:inherit; }
  .num{ direction:ltr; unicode-bidi:isolate; font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1; letter-spacing:.1px; }
  ::-webkit-scrollbar{ display:none; }
  :focus-visible{ outline:2px solid var(--blue); outline-offset:2px; }

  /* ---------------- device shell ---------------- */
  .stage{ width:100%; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:34px 12px; }
  .device{
    width:402px; height:874px; background:#0b0b0d; border-radius:56px; padding:12px;
    box-shadow:0 40px 80px -30px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04) inset;
    position:relative;
  }
  .screen{ position:relative; width:100%; height:100%; background:var(--bg); border-radius:44px; overflow:hidden; }
  .notch{ position:absolute; top:12px; left:50%; transform:translateX(-50%); width:120px; height:28px; background:#0b0b0d; border-radius:16px; z-index:50; }
  .home-indicator{ position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:130px; height:5px; border-radius:99px; background:#0b0b0d; opacity:.85; z-index:50; }

  /* ---------------- account bar (logged-in identity, replaces phone status bar) ---------------- */
  .account-bar{ height:58px; display:flex; align-items:center; justify-content:space-between; padding:0 14px; flex:0 0 auto; background:var(--elevated); border-bottom:1px solid var(--sep); }
  .account-identity{ display:flex; align-items:center; gap:9px; background:none; border:none; padding:2px 4px 2px 2px; border-radius:12px; }
  .account-identity:active{ background:var(--fill); }
  .account-avatar{ position:relative; width:36px; height:36px; border-radius:50%; flex:0 0 auto; background:linear-gradient(135deg,var(--violet),var(--violet-2)); color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 14px -6px rgba(91,79,224,.6); }
  .account-avatar::after{ content:""; position:absolute; bottom:-1px; inset-inline-start:-1px; width:10px; height:10px; border-radius:50%; background:var(--green); border:2px solid var(--elevated); }
  .account-text{ display:flex; flex-direction:column; align-items:flex-start; }
  .account-name{ font-size:13.5px; font-weight:800; color:var(--label); line-height:1.3; }
  .account-role{ font-size:10.5px; color:var(--label-3); font-weight:600; margin-top:1px; }
  .account-bell{ position:relative; width:36px; height:36px; border-radius:50%; background:var(--fill); border:none; display:flex; align-items:center; justify-content:center; color:var(--label-2); flex:0 0 auto; }
  .account-bell:active{ background:var(--sep); }
  .account-bell-dot{ position:absolute; top:5px; inset-inline-end:5px; min-width:15px; height:15px; padding:0 3px; border-radius:99px; background:var(--red); color:#fff; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; border:2px solid var(--elevated); }
  .account-bell-dot:empty{ display:none; }

  .tabbar{
    flex:0 0 auto; height:64px; display:flex; border-top:1px solid var(--sep);
    background:rgba(249,249,251,.92); backdrop-filter:blur(20px);
    padding-bottom:6px;
  }
  .tab-item{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:none; border:none; color:var(--label-3); font-size:10.5px; font-weight:600; }
  .tab-item.active{ color:var(--blue); }
  .tab-item svg{ width:23px; height:23px; }

  .app-body{ position:relative; flex:1 1 auto; height:calc(100% - 58px - 64px); overflow:hidden; }
  .device-inner{ display:flex; flex-direction:column; height:100%; }

  /* ---------------- views (push nav) ---------------- */
  .view{ position:absolute; inset:0; background:var(--bg); overflow-y:auto; -webkit-overflow-scrolling:touch; transition:transform .34s cubic-bezier(.32,.72,0,1); }
  .view-inbox{ transform:translateX(0); z-index:1; }
  .view-inbox::before{ content:""; position:absolute; inset:0; background:#000; opacity:0; pointer-events:none; transition:opacity .34s, backdrop-filter .34s; z-index:15; backdrop-filter:blur(0px); -webkit-backdrop-filter:blur(0px); }
  .view-inbox.pushed::before{ opacity:.22; pointer-events:auto; backdrop-filter:blur(9px); -webkit-backdrop-filter:blur(9px); }
  .view-inbox.pushed{ transform:translateX(0); }
  .view-detail{
    top:46px; bottom:0; left:0; right:0; height:auto;
    background:var(--bg); z-index:20; border-radius:20px 20px 0 0;
    transform:translateY(100%); transition:transform .38s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -16px 40px -12px rgba(0,0,0,.35);
    overflow:hidden; display:flex; flex-direction:column;
  }
  .view-detail.active{ transform:translateY(0); }
  .detail-drag-handle{ width:36px; height:5px; border-radius:99px; background:var(--sep); margin:8px auto 0; flex:0 0 auto; }
  .detail-scroll{ flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .view-reports{ transform:translateX(0); display:none; }
  .view-reports.active{ display:block; }

  /* ---------------- nav bar ---------------- */
  .navbar{ padding:6px 16px 8px; flex:0 0 auto; }
  .navbar-row{ display:flex; align-items:center; justify-content:flex-start; height:30px; }
  .back-btn{ display:flex; align-items:center; gap:2px; background:none; border:none; color:var(--blue); font-size:16px; font-weight:500; padding:0; }
  .nav-icon-btn{ background:none; border:none; color:var(--blue); font-size:15px; font-weight:600; }
  .icon-btn-circle{ width:32px; height:32px; border-radius:50%; background:var(--fill); border:none; display:flex; align-items:center; justify-content:center; color:var(--label-2); flex:0 0 auto; position:relative; }
  .icon-btn-circle:active{ background:var(--sep); }
  .header-actions{ display:flex; align-items:center; gap:6px; }
  .account-bar .header-actions{ gap:8px; }
  .account-bar .icon-btn-circle{ width:34px; height:34px; }
  .header-action-dot{ position:absolute; top:2px; inset-inline-end:2px; width:8px; height:8px; border-radius:50%; background:var(--red); border:1.5px solid var(--elevated); display:none; }
  .header-action-dot.show{ display:block; }
  .large-title{ font-size:32px; font-weight:900; letter-spacing:-.02em; margin:2px 0 2px; }
  .title-badge-wrap{ display:flex; justify-content:center; margin:4px 0 10px; }
  .title-badge{
    display:inline-flex; align-items:center; gap:7px;
    background:linear-gradient(135deg, rgba(124,111,240,.14), rgba(91,79,224,.06));
    border:1px solid rgba(124,111,240,.20);
    color:var(--violet-ink);
    font-size:18.5px; font-weight:800; letter-spacing:-.01em;
    padding:10px 20px; border-radius:16px;
    box-shadow:0 6px 16px -8px rgba(91,79,224,.35);
  }
  .title-badge svg{ width:17px; height:17px; flex:0 0 auto; color:var(--violet); }
  .large-sub{ font-size:12.5px; color:var(--label-2); margin-bottom:12px; }
  #inboxSub{ text-align:center; }

  /* route chip scroller */
  .route-scroll{ display:flex; gap:8px; overflow-x:auto; padding:2px 16px 14px; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; mask-image:linear-gradient(to left, transparent 0, #000 20px, #000 calc(100% - 20px), transparent 100%); -webkit-mask-image:linear-gradient(to left, transparent 0, #000 20px, #000 calc(100% - 20px), transparent 100%); }
  .route-chip{
    scroll-snap-align:start; flex:0 0 auto; display:flex; align-items:center; gap:6px;
    background:var(--elevated); border:1px solid var(--sep); color:var(--label-2);
    font-size:13px; font-weight:700; padding:8px 15px; border-radius:99px;
    box-shadow:0 1px 2px rgba(20,20,30,.05);
    transition:background .2s, color .2s, border-color .2s, box-shadow .2s;
  }
  .route-chip.active{
    background:linear-gradient(135deg,var(--violet),var(--violet-2)); border-color:transparent; color:#fff;
    box-shadow:0 8px 18px -8px rgba(91,79,224,.6);
  }
  .route-chip-badge{ background:rgba(0,0,0,.08); color:inherit; font-size:10px; font-weight:800; padding:1px 6px; border-radius:99px; }
  .route-chip.active .route-chip-badge{ background:rgba(255,255,255,.28); }

  /* status overview card — quick glance at pending/urgent/reviewed, above the inbox list */
  .status-overview{
    display:flex; align-items:stretch;
    background:var(--elevated); border:1px solid var(--sep);
    border-radius:18px; margin:2px 16px 12px; padding:13px 4px;
    box-shadow:0 1px 2px rgba(20,20,30,.04), 0 14px 28px -20px rgba(20,20,30,.28);
  }
  .status-stat{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; padding:3px 2px; border-radius:12px; }
  .status-stat:active{ background:var(--fill); }
  .status-stat .ss-value{ font-size:21px; font-weight:900; letter-spacing:0; line-height:1.1; }
  .status-stat .ss-label{ font-size:10.5px; font-weight:700; color:var(--label-2); }
  .status-stat.pending .ss-value{ color:var(--amber); }
  .status-stat.urgent .ss-value{ color:var(--red); }
  .status-stat.decided .ss-value{ color:var(--green); }
  .status-divider{ width:1px; align-self:center; height:30px; background:var(--sep); }
  .status-stat.active-filter{ background:var(--fill); }

  /* segmented control */
  .segmented{ display:flex; background:var(--fill); border-radius:11px; padding:2px; margin:0 16px 10px; }
  .seg-btn{ flex:1; border:none; background:none; padding:7px 2px; font-size:11px; font-weight:600; color:var(--label-2); border-radius:9px; transition:background .15s, color .15s; white-space:nowrap; }
  .seg-btn.active{ background:var(--elevated); color:var(--label); box-shadow:0 1px 3px rgba(0,0,0,.14); }
  .seg-btn.urgent-seg{ color:var(--red); }
  .seg-btn.urgent-seg.active{ color:var(--red); }

  /* ---------------- last-check / manual refresh bar ---------------- */
  .sync-chip{ display:flex; align-items:center; gap:5px; background:var(--fill); border:none; color:var(--label-2); font-size:11px; font-weight:700; padding:6px 10px; border-radius:99px; height:30px; flex:0 0 auto; white-space:nowrap; }
  .sync-chip:active{ background:var(--sep); }
  .sync-chip-icon{ width:12px; height:12px; flex:0 0 auto; color:var(--blue); }
  .sync-chip.loading .sync-chip-icon{ animation:refreshSpin .8s linear infinite; }
  .sync-chip:disabled{ opacity:.7; }

  /* ---------------- hero header: کارتابل نرخ‌گذاری ---------------- */
  .hero-card{
    position:relative; overflow:hidden; margin:6px 16px 14px; padding:18px 18px 16px; border-radius:24px;
    background:
      radial-gradient(120% 140% at 100% 0%, rgba(255,255,255,.16), transparent 55%),
      linear-gradient(135deg, var(--violet) 0%, var(--violet-2) 58%, var(--violet-ink) 100%);
    box-shadow:0 20px 44px -18px rgba(75,63,203,.58), 0 1px 0 rgba(255,255,255,.08) inset;
    isolation:isolate;
  }
  .hero-card::before{
    content:""; position:absolute; inset:0; z-index:-1;
    background-image:radial-gradient(rgba(255,255,255,.14) 1px, transparent 1px);
    background-size:14px 14px; opacity:.35; mask-image:linear-gradient(135deg,#000,transparent 70%);
  }
  .hero-glow{ position:absolute; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.16); filter:blur(30px); top:-70px; inset-inline-end:-50px; z-index:-1; pointer-events:none; }
  .hero-glow-2{ position:absolute; width:130px; height:130px; border-radius:50%; background:rgba(255,255,255,.10); filter:blur(26px); bottom:-60px; inset-inline-start:-30px; z-index:-1; pointer-events:none; }
  .hero-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .hero-title-group{ display:flex; align-items:center; gap:11px; min-width:0; }
  .hero-icon{ width:42px; height:42px; border-radius:13px; flex:0 0 auto; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.22); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 14px -6px rgba(0,0,0,.25); }
  .hero-icon svg{ width:20px; height:20px; color:#fff; }
  .hero-title{ font-size:19px; font-weight:900; letter-spacing:-.01em; color:#fff; line-height:1.25; }
  .hero-title-tag{ display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:800; color:rgba(255,255,255,.82); margin-top:2px; }
  .hero-title-tag::before{ content:""; width:6px; height:6px; border-radius:50%; background:#3EE07A; box-shadow:0 0 0 3px rgba(62,224,122,.28); flex:0 0 auto; }
  .hero-refresh{
    display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:50%; flex:0 0 auto;
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.24); color:#fff;
    transition:background .15s, transform .15s;
  }
  .hero-refresh:active{ background:rgba(255,255,255,.24); transform:scale(.94); }
  .hero-refresh:disabled{ opacity:.75; }
  .hero-refresh-icon{ width:16px; height:16px; }
  .hero-refresh.loading .hero-refresh-icon{ animation:refreshSpin .8s linear infinite; }
  .hero-meta{ display:flex; align-items:stretch; gap:8px; margin-top:16px; }
  .hero-chip{
    flex:1 1 0; min-width:0; display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:14px;
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.16); backdrop-filter:blur(4px);
  }
  .hero-chip-icon{ width:26px; height:26px; border-radius:9px; flex:0 0 auto; background:rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center; }
  .hero-chip-icon svg{ width:13px; height:13px; color:#fff; }
  .hero-chip-text{ min-width:0; display:flex; flex-direction:column; gap:1px; }
  .hero-chip-label{ font-size:9.5px; font-weight:700; color:rgba(255,255,255,.68); }
  .hero-chip-value{ font-size:12px; font-weight:800; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  @keyframes refreshSpin{ to{ transform:rotate(360deg); } }

  /* ---------------- date/rate overview strip ---------------- */
  .date-strip-wrap{ margin:2px 0 14px; }
  .date-strip-label{ display:flex; align-items:center; gap:6px; padding:0 16px; margin-bottom:10px; font-size:13px; font-weight:700; color:var(--label-2); }
  .date-strip-label svg{ width:14px; height:14px; color:var(--violet); flex:0 0 auto; }
  .date-strip{ display:flex; gap:8px; overflow-x:auto; padding:10px 16px 8px; scroll-snap-type:x proximity; align-items:flex-start; -webkit-overflow-scrolling:touch; mask-image:linear-gradient(to left, transparent 0, #000 20px, #000 calc(100% - 20px), transparent 100%); -webkit-mask-image:linear-gradient(to left, transparent 0, #000 20px, #000 calc(100% - 20px), transparent 100%); }
  .date-card{
    scroll-snap-align:start; flex:0 0 auto; width:98px; height:108px; text-align:center; background:var(--elevated);
    border-radius:14px; padding:9px 7px 8px; border:1.5px solid rgba(20,20,30,.06); position:relative; overflow:hidden;
    box-shadow:0 1px 2px rgba(20,20,30,.04), 0 10px 20px -16px rgba(20,20,30,.2); transition:transform .12s;
    display:flex; flex-direction:column; line-height:1.25;
  }
  .dc-content{ display:flex; flex-direction:column; flex:1 1 auto; min-height:0; overflow:hidden; }
  .date-card:active{ transform:scale(.96); }
  .dc-weekday-row{ display:flex; align-items:center; justify-content:center; gap:4px; }
  .date-card.today{ border-color:var(--label); }
  .dc-today-mark{ width:5px; height:5px; border-radius:50%; background:var(--label); flex:0 0 auto; }
  .dc-weekday{ font-size:10px; font-weight:600; color:var(--label-2); line-height:1.3; }
  .date-card.today .dc-weekday{ color:var(--label); font-weight:800; }
  .dc-day{ font-size:11.5px; font-weight:600; color:var(--label-3); margin-top:1px; line-height:1.3; }
  .dc-divider{ height:1px; background:var(--sep); margin:7px 0; flex:0 0 auto; }
  .dc-bottom{ display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1 1 auto; min-height:0; gap:3px; }
  .dc-rate{ font-size:13px; font-weight:400; line-height:1.35; letter-spacing:0; white-space:nowrap; color:var(--label); }
  .dc-rate.empty{ color:var(--label-3); font-weight:600; font-size:9.5px; line-height:1.4; white-space:normal; }
  .dc-supplier{ font-size:9.5px; font-weight:600; color:var(--label-3); max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 2px; line-height:1.3; }
  .dc-supplier.own{ color:var(--violet-ink); font-weight:700; }

  /* ---------------- inbox list (each message as a separated, shadowed card) ---------------- */
  .list{ padding:2px 12px 20px; }
  .row-wrap{ position:relative; overflow:hidden; border-radius:16px; margin-bottom:10px; box-shadow:0 1px 2px rgba(20,20,30,.05), 0 12px 24px -18px rgba(20,20,30,.28); }
  .row-bg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:space-between; padding:0 18px; }
  .row-bg-action{ font-size:12px; font-weight:800; display:flex; align-items:center; gap:5px; opacity:0; transition:opacity .12s; }
  .row-bg-action.approve{ color:#fff; }
  .row-bg-action.reject{ color:#fff; }
  .row-content{
    position:relative; display:flex; align-items:flex-start; gap:11px; padding:14px 16px;
    background:var(--elevated); touch-action:pan-y; transition:background .15s; border:1px solid rgba(20,20,30,.045);
  }
  .row-wrap.flagged .row-content{ border-inline-start:3px solid var(--amber); padding-inline-start:14px; background:linear-gradient(90deg, rgba(242,167,59,.08), var(--elevated) 45%); }

  /* alert badge = what the assistant wants to do, at a glance */
  .alert-badge{ width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; margin-top:1px; position:relative; }
  .alert-badge svg{ width:17px; height:17px; }
  .alert-badge.up{ background:linear-gradient(135deg,#34C471,#1F9C4C); color:#fff; box-shadow:0 6px 14px -6px rgba(31,156,76,.5); }
  .alert-badge.down{ background:linear-gradient(135deg,#FF6259,#E0342A); color:#fff; box-shadow:0 6px 14px -6px rgba(224,52,42,.55); }
  .alert-badge.flat{ background:var(--fill); color:var(--label-2); }
  .alert-badge.unread::after{ content:""; position:absolute; top:-2px; left:-2px; width:9px; height:9px; border-radius:50%; background:var(--amber); border:2px solid var(--elevated); }
  @keyframes pulseRing{ 0%{ box-shadow:0 0 0 0 rgba(242,167,59,.55);} 70%{ box-shadow:0 0 0 6px rgba(242,167,59,0);} 100%{ box-shadow:0 0 0 0 rgba(242,167,59,0);} }
  .alert-badge.unread{ animation:pulseRing 2.6s infinite; }

  .row-main{ flex:1; min-width:0; }
  .row-top{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
  .row-title-wrap{ display:flex; align-items:baseline; gap:6px; min-width:0; }
  .row-title{ font-size:17px; font-weight:800; letter-spacing:-.01em; }
  .row-weekday{ font-size:12px; color:var(--label-3); font-weight:600; }
  .row-flag-ico{ color:var(--amber); font-size:11px; flex:0 0 auto; }
  .row-new-badge{ background:var(--red); color:#fff; font-size:9.5px; font-weight:800; padding:2px 7px; border-radius:99px; flex:0 0 auto; }
  .row-time{ font-size:11.5px; color:var(--label-2); font-weight:700; flex:0 0 auto; white-space:nowrap; }
  .row-alert-line{ font-size:12.5px; color:var(--label-2); margin-top:4px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row-bottom{ display:flex; align-items:center; gap:7px; margin-top:8px; flex-wrap:wrap; }
  .row-target{ font-size:15.5px; font-weight:700; letter-spacing:0; color:var(--label); }
  .row-badge{ font-size:10.5px; font-weight:800; padding:2.5px 8px; border-radius:99px; }
  .row-status-txt{ font-size:10.5px; color:var(--label-3); font-weight:600; margin-inline-start:auto; }
  .row-chevron{ color:var(--label-3); font-size:16px; padding-top:10px; flex:0 0 auto; }

  /* ---------------- detail view ---------------- */
  .detail-nav{ display:flex; align-items:center; justify-content:space-between; padding:6px 12px; }
  .detail-header{ padding:6px 20px 16px; border-bottom:1px solid var(--sep); background:var(--elevated); }
  .detail-eyebrow{ font-size:11px; font-weight:700; color:var(--blue); text-transform:none; margin-bottom:6px; display:flex; align-items:center; gap:5px; }
  .detail-subject{ font-size:19px; font-weight:800; line-height:1.5; }
  .detail-ourflight{ font-size:12.5px; color:var(--violet-ink); font-weight:800; margin-top:5px; }
  .detail-meta{ font-size:11.5px; color:var(--label-2); margin-top:6px; }

  .detail-body{ padding:16px; }
  .card{ background:var(--elevated); border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:0 1px 2px rgba(20,20,30,.04), 0 12px 26px -18px rgba(20,20,30,.22); border:1px solid rgba(20,20,30,.04); }
  .card-title{ font-size:11.5px; font-weight:700; color:var(--label-2); margin-bottom:10px; display:flex; align-items:center; gap:6px; }

  .stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .stat-cell{ text-align:center; }
  .stat-cell .v{ font-size:17px; font-weight:700; letter-spacing:0; }
  .stat-cell .l{ font-size:10px; color:var(--label-3); margin-top:2px; }
  .stat-cell.min .v{ color:var(--green); }
  .stat-cell.max .v{ color:var(--red); }
  .stat-cell.avg .v{ color:var(--orange); }
  .stat-divider{ height:1px; background:var(--sep); margin:12px 0; }

  .alt-track{ position:relative; height:8px; border-radius:99px; background:linear-gradient(90deg,#d6f3e2,#fde4bd,#fdd9d6); margin-top:22px; }
  .alt-needle{ position:absolute; top:-6px; width:2px; height:20px; background:var(--label); border-radius:2px; }
  .alt-needle::after{ content:""; position:absolute; top:-4px; left:50%; transform:translateX(-50%); width:8px; height:8px; border-radius:50%; background:var(--label); box-shadow:0 0 0 3px var(--elevated); }
  .alt-tag{ position:absolute; top:-30px; transform:translateX(50%); font-size:10.5px; font-weight:650; background:var(--label); color:#fff; padding:3px 7px; border-radius:7px; white-space:nowrap; }
  .alt-labels{ display:flex; justify-content:space-between; font-size:10px; color:var(--label-3); margin-top:8px; }

  /* --- assistant / suggestion card (signature element) --- */
  .suggestion-card{ background:linear-gradient(165deg,#F4F2FF,#FFFFFF 58%); border:1px solid #E4DEFB; position:relative; overflow:hidden; }
  .suggestion-card::before{ content:""; position:absolute; top:-46px; left:-46px; width:150px; height:150px; border-radius:50%; background:radial-gradient(circle,rgba(124,111,240,.20),transparent 70%); pointer-events:none; }
  .assistant-head{ display:flex; align-items:center; gap:10px; margin-bottom:12px; position:relative; }
  .assistant-avatar{ width:32px; height:32px; border-radius:11px; background:linear-gradient(135deg,var(--violet),var(--violet-2)); display:flex; align-items:center; justify-content:center; flex:0 0 auto; box-shadow:0 6px 14px -6px rgba(91,79,224,.65); }
  .assistant-avatar svg{ width:16px; height:16px; }
  .assistant-name{ font-size:12.5px; font-weight:800; color:var(--violet-ink); }
  .assistant-sub{ font-size:10.5px; color:var(--label-3); margin-top:1px; }
  .factor-row{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; position:relative; }
  .factor-chip{ font-size:10.5px; font-weight:700; background:rgba(124,111,240,.12); color:var(--violet-ink); padding:4.5px 10px; border-radius:99px; }
  .factor-chip.warn{ background:#FFE9CE; color:#A85E00; }
  .factor-chip.good{ background:#DFF6E6; color:#1F9C4C; }
  .suggestion-text{ font-size:13px; line-height:2; color:#3c3a45; margin-bottom:12px; position:relative; }
  .suggestion-target{ display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; position:relative; }
  .suggestion-target .fig{ font-size:20px; font-weight:700; letter-spacing:0; color:var(--violet-ink); }
  .delta-chip{ font-size:11px; font-weight:650; padding:3px 9px; border-radius:99px; }
  .delta-up{ background:#DFF6E6; color:#1F9C4C; }
  .delta-down{ background:#FFE5E3; color:#D8342A; }
  .delta-flat{ background:var(--fill); color:var(--label-2); }

  .manifest-row{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:9px 0; border-bottom:1px solid var(--sep-soft); }
  .manifest-row:last-child{ border-bottom:none; }
  .m-left{ display:flex; align-items:center; gap:8px; min-width:0; }
  .airline-dot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .m-name{ font-size:13px; font-weight:700; }
  .m-agency{ font-size:10.5px; color:var(--blue); margin-top:1px; }
  .m-right{ text-align:left; flex:0 0 auto; }
  .m-price{ font-size:14px; font-weight:700; }
  .m-price.cheapest{ color:var(--green); }
  .m-meta{ font-size:10px; color:var(--label-3); margin-top:1px; }
  .cheapest-tag{ display:inline-block; font-size:9px; font-weight:800; color:var(--green); background:#DFF6E6; padding:1px 6px; border-radius:99px; margin-inline-start:5px; }

  /* status pill in detail */
  .status-pill{ font-size:10.5px; font-weight:800; padding:4px 10px; border-radius:99px; }
  .status-pending{ background:#FFF1D6; color:#B4780C; }
  .status-approved{ background:#DFF6E6; color:#1F9C4C; }
  .status-rejected{ background:var(--fill); color:var(--label-2); }
  .status-manual{ background:#E1EFFF; color:#0A66C8; }

  /* bottom action bar (detail) — persistent footer, not an overlay */
  .action-bar{
    flex:0 0 auto; z-index:20;
    background:rgba(249,249,251,.92); backdrop-filter:blur(20px);
    border-top:1px solid var(--sep); padding:8px 14px 18px; display:flex; gap:8px;
  }
  .abtn{ flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; padding:7px 2px; border-radius:12px; }
  .abtn svg{ width:21px; height:21px; }
  .abtn span{ font-size:10.5px; font-weight:700; }
  .abtn.reject{ color:var(--label-2); }
  .abtn.manual{ color:var(--blue); }
  .abtn.approve{ color:var(--green); }
  .abtn:active{ background:var(--fill); }

  .inline-manual{ padding:0 16px 12px; }
  .inline-manual-row{ display:flex; gap:8px; }
  .inline-manual-row input{ flex:1; background:var(--elevated); border:1px solid var(--sep); border-radius:11px; padding:9px 12px; font-size:13px; outline:none; }
  .inline-manual-row input:focus{ border-color:var(--blue); }
  .inline-manual-row button{ background:var(--blue); color:#fff; border:none; border-radius:11px; padding:0 16px; font-size:12.5px; font-weight:700; }

  /* ---------------- action sheet ---------------- */
  .sheet-scrim{ position:absolute; inset:0; background:rgba(0,0,0,.22); z-index:60; opacity:0; pointer-events:none; transition:opacity .25s, backdrop-filter .25s; backdrop-filter:blur(0px); -webkit-backdrop-filter:blur(0px); }
  .sheet-scrim.open{ opacity:1; pointer-events:auto; backdrop-filter:blur(9px); -webkit-backdrop-filter:blur(9px); }
  .sheet{ position:absolute; left:10px; right:10px; bottom:10px; z-index:61; transform:translateY(120%); transition:transform .3s cubic-bezier(.32,.72,0,1); }
  .sheet.open{ transform:translateY(0); }
  .sheet-group{ background:rgba(249,249,251,.98); border-radius:14px; overflow:hidden; margin-bottom:8px; }
  .sheet-hint{ text-align:center; font-size:12px; color:var(--label-2); padding:10px 16px; border-bottom:1px solid var(--sep); }
  .sheet-hint-title{ text-align:center; font-size:12px; font-weight:800; color:var(--label-2); padding:2px 16px 8px; }
  .sheet-option{ width:100%; background:none; border:none; padding:14px; font-size:15.5px; text-align:center; color:var(--blue); font-weight:500; border-bottom:1px solid var(--sep); }
  .sheet-option:last-child{ border-bottom:none; }
  .sheet-option.destructive{ color:var(--red); }
  .sheet-cancel{ width:100%; background:rgba(249,249,251,.98); border:none; border-radius:14px; padding:14px; font-size:16px; font-weight:700; color:var(--blue); }
  .flight-list-group{ max-height:min(52vh,420px); overflow-y:auto; }
  .flight-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 14px; border-bottom:1px solid var(--sep); }
  .flight-row:last-child{ border-bottom:none; }
  .flight-row.own-row{ background:rgba(91,79,224,.07); }
  .flight-row.own-row .flight-airline{ color:var(--violet-ink); }
  .flight-row.cheapest-row{ background:rgba(48,184,85,.06); }
  .flight-row-main{ display:flex; flex-direction:column; gap:3px; text-align:right; min-width:0; }
  .flight-airline{ font-size:13px; font-weight:800; color:var(--label); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .flight-no{ font-size:10.5px; color:var(--label-3); font-weight:600; }
  .flight-agency{ font-size:10.5px; color:var(--label-3); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .flight-row-side{ display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex:0 0 auto; text-align:left; }
  .flight-time{ font-size:11px; color:var(--label-2); font-weight:700; }
  .flight-price{ font-size:14px; font-weight:700; color:var(--label); letter-spacing:0; }
  .flight-seats{ font-size:10px; color:var(--label-3); font-weight:600; }
  .mgr-msg{ padding:12px 14px; border-bottom:1px solid var(--sep); text-align:right; }
  .mgr-msg:last-child{ border-bottom:none; }
  .mgr-msg-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .mgr-msg-from{ font-size:12.5px; font-weight:800; color:var(--label); display:flex; align-items:center; gap:5px; }
  .mgr-msg-from .dot{ width:6px; height:6px; border-radius:50%; background:var(--red); flex:0 0 auto; }
  .mgr-msg-date{ font-size:10.5px; color:var(--label-3); font-weight:600; }
  .mgr-msg-text{ font-size:13px; color:var(--label-2); line-height:1.6; }

  /* ---------------- notification banner ---------------- */
  .banner-host{ position:absolute; top:0; left:0; right:0; z-index:80; display:flex; justify-content:center; padding-top:8px; pointer-events:none; }
  .banner{ width:calc(100% - 16px); max-width:370px; background:rgba(255,255,255,.88); backdrop-filter:blur(20px); border-radius:16px; box-shadow:0 12px 30px -10px rgba(0,0,0,.3); padding:10px 12px; display:flex; gap:9px; align-items:flex-start; transform:translateY(-140%); transition:transform .38s cubic-bezier(.32,.85,.2,1); pointer-events:auto; }
  .banner.show{ transform:translateY(0); }
  .banner-icon{ width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--amber),#c9862c); display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .banner-icon svg{ width:16px; height:16px; }
  .banner-title-row{ display:flex; justify-content:space-between; align-items:baseline; }
  .banner-app{ font-size:11px; font-weight:700; color:var(--label-2); }
  .banner-time{ font-size:11px; color:var(--label-3); }
  .banner-title{ font-size:13px; font-weight:800; margin-top:1px; }
  .banner-msg{ font-size:12px; color:var(--label-2); margin-top:1px; line-height:1.5; }

  /* ---------------- reports view ---------------- */
  .grouped-card{ background:var(--elevated); border-radius:var(--radius); overflow:hidden; margin:0 16px 16px; box-shadow:0 1px 2px rgba(20,20,30,.04), 0 12px 26px -18px rgba(20,20,30,.2); border:1px solid rgba(20,20,30,.04); }
  .grouped-row{ display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--sep-soft); font-size:13.5px; }
  .grouped-row:last-child{ border-bottom:none; }
  .grouped-row .l{ color:var(--label); display:flex; align-items:center; gap:6px; }
  .grouped-row .r{ font-weight:800; }

  .kpi-grid{ display:grid; grid-template-columns:1fr 1fr; }
  .kpi-cell{ padding:14px; text-align:center; border-bottom:1px solid var(--sep-soft); }
  .kpi-cell:nth-child(odd){ border-left:1px solid var(--sep-soft); }
  .kpi-cell .v{ font-size:23px; font-weight:700; letter-spacing:0; }
  .kpi-cell .l{ font-size:10.5px; color:var(--label-2); margin-top:3px; }

  .chart-card{ background:var(--elevated); border-radius:var(--radius); padding:16px; margin:0 16px 16px; box-shadow:0 1px 2px rgba(20,20,30,.04), 0 12px 26px -18px rgba(20,20,30,.2); border:1px solid rgba(20,20,30,.04); }
  .chart-legend{ display:flex; gap:14px; font-size:11px; color:var(--label-2); margin-bottom:12px; }
  .legend-dot{ width:8px; height:8px; border-radius:2px; display:inline-block; margin-inline-end:5px; }
  .bars{ display:flex; align-items:flex-end; gap:10px; height:130px; }
  .bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; }
  .bar-stack{ display:flex; align-items:flex-end; gap:3px; height:100%; }
  .bar{ width:11px; border-radius:4px 4px 2px 2px; }
  .bar-market{ background:#C9CFE0; }
  .bar-ours{ background:var(--amber); }
  .bar-date{ font-size:9.5px; color:var(--label-3); margin-top:6px; }

  .empty{ text-align:center; padding:60px 20px; color:var(--label-3); font-size:13px; }
  .empty svg{ opacity:.35; margin-bottom:10px; }

  @media (max-width:480px){
    html, body{ height:100%; }
    .stage{ padding:0; min-height:100vh; min-height:100dvh; align-items:stretch; }
    .device{
      width:100vw; height:100vh; height:100dvh; border-radius:0; padding:0; box-shadow:none;
    }
    .screen{ border-radius:0; height:100%; }
    .notch, .home-indicator{ display:none; }

    /* حاشیه‌ی امن بالا/پایین گوشی‌های واقعی، تا نوار تب‌ها همیشه دیده شود */
    .account-bar{ height:calc(58px + env(safe-area-inset-top)); padding-top:env(safe-area-inset-top); }
    .tabbar{ height:calc(64px + env(safe-area-inset-bottom)); padding-bottom:calc(6px + env(safe-area-inset-bottom)); }
    .app-body{ height:calc(100% - 58px - env(safe-area-inset-top) - 64px - env(safe-area-inset-bottom)); }

    /* اندازه‌ی استاندارد برای نمایش در مرورگر موبایل، کمی جمع‌وجورتر از حالت مکاپ دسکتاپ */
    .large-title{ font-size:26px; }
    .row-title{ font-size:16px; }
    .detail-subject{ font-size:17.5px; }
    .date-card{ width:92px; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="device">
    <div class="notch"></div>
    <div class="screen">
      <div class="device-inner">
        <div class="account-bar" id="accountBar">
          <button class="account-identity" id="btnAccount" title="حساب کاربری">
            <span class="account-avatar">س.ر</span>
            <span class="account-text">
              <span class="account-name">سارا رضایی</span>
              <span class="account-role">کارشناس نرخ‌گذاری</span>
            </span>
          </button>
          <div class="header-actions">
            <button class="icon-btn-circle" id="btnManagerMsgs" title="پیام‌های مدیر">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span class="header-action-dot" id="managerMsgDot"></span>
            </button>
            <button class="icon-btn-circle" id="btnHome" title="خانه">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
            </button>
            <button class="icon-btn-circle" id="btnLogout" title="خروج از حساب">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
            <button class="account-bell" id="btnNotif" title="اعلان‌ها">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="account-bell-dot" id="notifDot"></span>
            </button>
          </div>
        </div>

        <div class="app-body">
          <div class="banner-host"><div class="banner" id="banner"></div></div>

          <!-- INBOX -->
          <div class="view view-inbox" id="viewInbox">
            <div class="navbar">
              <div class="hero-card" id="heroCard">
                <div class="hero-glow"></div>
                <div class="hero-glow-2"></div>
                <div class="hero-top">
                  <div class="hero-title-group">
                    <div class="hero-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
                    </div>
                    <div>
                      <div class="hero-title">کارتابل نرخ‌گذاری</div>
                      <div class="hero-title-tag">پایش زنده‌ی نرخ پروازها</div>
                    </div>
                  </div>
                  <button class="hero-refresh" id="btnCheckNow" title="بررسی الان">
                    <svg class="hero-refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
                  </button>
                </div>
                <div class="hero-meta">
                  <div class="hero-chip">
                    <div class="hero-chip-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    </div>
                    <div class="hero-chip-text">
                      <span class="hero-chip-label">مسیر انتخابی</span>
                      <span class="hero-chip-value" id="inboxSub">تهران–استانبول · بازار بین‌المللی</span>
                    </div>
                  </div>
                  <div class="hero-chip">
                    <div class="hero-chip-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14"/></svg>
                    </div>
                    <div class="hero-chip-text">
                      <span class="hero-chip-label">آخرین بروزرسانی</span>
                      <span class="hero-chip-value" id="lastCheckLabel">همین الان</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="route-scroll" id="routeScrollInbox"></div>

            <div class="status-overview" id="statusOverview">
              <button class="status-stat pending" data-filter="pending">
                <span class="ss-value num" id="statPending">۰</span>
                <span class="ss-label">در انتظار</span>
              </button>
              <div class="status-divider"></div>
              <button class="status-stat urgent" data-filter="urgent">
                <span class="ss-value num" id="statUrgent">۰</span>
                <span class="ss-label">فوری</span>
              </button>
              <div class="status-divider"></div>
              <button class="status-stat decided" data-filter="decided">
                <span class="ss-value num" id="statDecided">۰</span>
                <span class="ss-label">بررسی‌شده</span>
              </button>
            </div>

            <div class="segmented">
              <button class="seg-btn" data-filter="all">همه</button>
              <button class="seg-btn active" data-filter="pending">در انتظار</button>
              <button class="seg-btn urgent-seg" data-filter="urgent">فوری</button>
              <button class="seg-btn" data-filter="decided">بررسی‌شده</button>
            </div>


            <div class="date-strip-wrap">
              <div class="date-strip-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                وضعیت نرخ این مسیر تا پایان ماه
              </div>
              <div class="date-strip" id="dateStrip"></div>
            </div>

            <div class="list" id="inboxList"></div>
          </div>

          <!-- DETAIL -->
          <div class="view view-detail" id="viewDetail">
            <div class="detail-drag-handle"></div>
            <div class="detail-nav">
              <button class="icon-btn-circle" id="btnMore" title="گزینه‌های بیشتر">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
              </button>
              <button class="icon-btn-circle" id="btnBack" title="بستن">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div class="detail-scroll" id="detailScroll">
              <div id="detailContent"></div>

<script>
/* ============================== ابزار کمکی ============================== */
const AIRLINE_COLORS = {
  "ماهان":"#e5484d","آتا":"#3b82f6","آسمان":"#06b6d4","وارش":"#f97316",
  "کاسپین":"#22c55e","قشم ایر":"#14b8a6","ایران‌ایر":"#2563eb","معراج":"#ec4899",
  "زاگرس":"#a855f7","فلای پرشیا":"#eab308",
};
const airlineColor = (n)=> AIRLINE_COLORS[n] || "#8E8E93";
const fmt = (n)=> n.toLocaleString("fa-IR");
/* نمایش فشرده‌ی نرخ به میلیون تومان با یک رقم اعشار، مثل ۱۹/۲ */
const fmtShort = (n)=>{
  const millions = Math.round(n/100000)/10;
  const [intPart, decPart="0"] = millions.toFixed(1).split(".");
  return `${toFaNum(intPart)}/${toFaNum(decPart)}`;
};
/* نمایش کامل عدد نرخ با جداکننده‌ی «/» هر سه رقم، بدون واحد، مثل ۱۹/۰۰۰/۰۰۰ */
const fmtSlash = (n)=>{
  let s = String(Math.round(n));
  const groups = [];
  while(s.length > 3){ groups.unshift(s.slice(-3)); s = s.slice(0, -3); }
  groups.unshift(s);
  return toFaNum(groups.join("/"));
};

/* ابزار تقویم شمسی (تبدیل دقیق میلادی↔شمسی، بدون وابستگی به داده‌های ثابت) */
const FA_DIGITS = "۰۱۲۳۴۵۶۷۸۹";
const toFaNum = (n)=> String(n).replace(/\d/g, d=>FA_DIGITS[d]);
const PERSIAN_WEEK = ["شنبه","یکشنبه","دوشنبه","سه‌شنبه","چهارشنبه","پنجشنبه","جمعه"];
const PERSIAN_MONTHS = ["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
const PERSIAN_MONTH_DAYS = { "فروردین":31,"اردیبهشت":31,"خرداد":31,"تیر":31,"مرداد":31,"شهریور":31,"مهر":30,"آبان":30,"آذر":30,"دی":30,"بهمن":30,"اسفند":29 };

/* الگوریتم دقیق تبدیل تاریخ میلادی به شمسی (jalaali) */
function _div(a,b){ return ~~(a/b); }
function _mod(a,b){ return a - ~~(a/b)*b; }
function _jalCal(jy){
  const breaks=[-61,9,38,199,426,686,756,818,1111,1181,1210,1635,2060,2097,2192,2262,2324,2394,2456,3178];
  let gy=jy+621, leapJ=-14, jp=breaks[0], jm, jump=0, n;
  for(let i=1;i<breaks.length;i++){
    jm=breaks[i]; jump=jm-jp;
    if(jy<jm) break;
    leapJ = leapJ + _div(jump,33)*8 + _div(_mod(jump,33),4);
    jp=jm;
  }
  n = jy-jp;
  leapJ = leapJ + _div(n,33)*8 + _div(_mod(n,33)+3,4);
  if(_mod(jump,33)===4 && jump-n===4) leapJ+=1;
  const leapG = _div(gy,4) - _div((_div(gy,100)+1)*3,4) - 150;
  const march = 20 + leapJ - leapG;
  return { gy, march };
}
function _g2d(gy,gm,gd){
  let d = _div((gy+_div(gm-8,6)+100100)*1461,4) + _div(153*_mod(gm+9,12)+2,5) + gd - 34840408;
  d = d - _div(_div(gy+100100+_div(gm-8,6),100)*3,4) + 752;
  return d;
}
function _d2g(jdn){
  let j = 4*jdn + 139361631;
  j = j + _div(_div(4*jdn+183187720,146097)*3,4)*4 - 3908;
  const i = _div(_mod(j,1461),4)*5 + 308;
  const gd = _div(_mod(i,153),5) + 1;
  const gm = _mod(_div(i,153),12) + 1;
  const gy = _div(j,1461) - 100100 + _div(8-gm,6);
  return { gy, gm, gd };
}
function gregorianToJalali(gy,gm,gd){
  const jdn = _g2d(gy,gm,gd);
  const gy2 = _d2g(jdn).gy, jy0 = gy2-621, r=_jalCal(jy0), jdn1f=_g2d(gy2,3,r.march);
  let k = jdn - jdn1f, jy=jy0, jm, jd;
  if(k>=0){
    if(k<=185){ jm=1+_div(k,31); jd=_mod(k,31)+1; return {jy,jm,jd}; }
    k-=186;
  } else { jy-=1; k+=179; }
  jm=7+_div(k,30); jd=_mod(k,30)+1;
  return { jy, jm, jd };
}

/* «امروز» واقعی دستگاه، به‌عنوان مبنای همه‌ی تاریخ‌های نمایشی */
const NOW = new Date();
const TODAY_GREG = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate());
const TODAY_JALALI = gregorianToJalali(TODAY_GREG.getFullYear(), TODAY_GREG.getMonth()+1, TODAY_GREG.getDate());
const TODAY_WEEKDAY_IDX = (TODAY_GREG.getDay()+1) % 7; // نگاشت یکشنبه۰..شنبه۶ جاوااسکریپت به شنبه۰..جمعه۶ تقویم ایرانی

/* برچسب کامل تاریخ شمسی و روز هفته برای هر آفست (روز نسبت به امروز) */
function jalaliInfoForOffset(offsetDays){
  const g = new Date(TODAY_GREG); g.setDate(g.getDate()+offsetDays);
  const j = gregorianToJalali(g.getFullYear(), g.getMonth()+1, g.getDate());
  const weekdayIdx = (g.getDay()+1) % 7;
  let timeLabel;
  if(offsetDays===0) timeLabel="امروز";
  else if(offsetDays===1) timeLabel="فردا";
  else if(offsetDays===-1) timeLabel="دیروز";
  else if(offsetDays<-1) timeLabel=`${toFaNum(-offsetDays)} روز پیش`;
  else timeLabel=`${toFaNum(offsetDays)} روز دیگر`;
  return {
    jalali: `${toFaNum(j.jd)} ${PERSIAN_MONTHS[j.jm-1]}`,
    weekday: PERSIAN_WEEK[weekdayIdx],
    time: timeLabel,
    jy:j.jy, jm:j.jm, jd:j.jd,
  };
}

/* منطق کارت: ارزان‌ترین نرخ آن روز بین «نرخ خودمان» و «همه‌ی رقبا»، به‌همراه نام تأمین‌کننده */
function cheapestOfDay(entry){
  const stats = computeStats(entry.flights);
  const ourRate = state.ourRates[entry.key];
  const isOwn = ourRate <= stats.min;
  return {
    price: isOwn ? ourRate : stats.min,
    isOwn,
    supplier: isOwn ? "خودم" : (stats.cheapest.agency || stats.cheapest.airline),
  };
}

/* از امروز تا پایان همان ماه شمسی، تقویم نرخ این مسیر را می‌سازد */
function buildMonthStrip(route){
  const dates = route.dates;
  const monthName = PERSIAN_MONTHS[TODAY_JALALI.jm-1];
  const monthLen = PERSIAN_MONTH_DAYS[monthName] || 31;
  const byDay = {};
  dates.forEach(d=>{ if(d.jy===TODAY_JALALI.jy && d.jm===TODAY_JALALI.jm) byDay[d.jd] = d; });
  const cards = [];
  for(let day=TODAY_JALALI.jd; day<=monthLen; day++){
    const weekdayIdx = ((TODAY_WEEKDAY_IDX + (day - TODAY_JALALI.jd)) % 7 + 7) % 7;
    const entry = byDay[day];
    let cheapest = null;
    if(entry) cheapest = cheapestOfDay(entry);
    cards.push({
      day, month:monthName, weekday:PERSIAN_WEEK[weekdayIdx], isToday: day===TODAY_JALALI.jd,
      key: entry ? entry.key : null,
      cheapest,
    });
  }
  return cards;
}
function renderDateStrip(){
  const host = document.getElementById("dateStrip");
  if(!host) return;
  const cards = buildMonthStrip(getRoute());

        : `<div class="dc-rate empty">پرواز موجود نیست</div>`}

  `).join("");

}

/* PRNG قطعی برای تولید داده‌های نمونه‌ی هر مسیر (خروجی همیشه ثابت است) */
function mulberry32(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
/* دو تاریخ (آفست‌های روز نسبت به امروز) را به فیلدهای شمسی واقعی متصل می‌کند */
function withOffset(offset, obj){ return Object.assign({}, obj, jalaliInfoForOffset(offset)); }

function genDates(routeKey, seed, o){
  const rnd = mulberry32(seed);
  const pick = arr => arr[Math.floor(rnd()*arr.length)];
  const dates = [];
  for(let i=0;i<o.dayOffsets.length;i++){
    const flights = [];
    const usedNo = new Set();
    for(let j=0;j<o.flightsPerDate;j++){
      let flightNo;
      do{ flightNo = String(1000+Math.floor(rnd()*8999)); } while(usedNo.has(flightNo));
      usedNo.add(flightNo);
      const hh = String(Math.floor(rnd()*24)).padStart(2,"0");
      const mm = pick(["00","15","30","45"]);
      const price = Math.round((o.priceMin + rnd()*(o.priceMax-o.priceMin))/50000)*50000;
      flights.push({
        airline: pick(o.airlines), flightNo, time:`${hh}:${mm}`,
        price, seatsLeft: 1+Math.floor(rnd()*9), agency: pick(o.agencies),
      });
    }
    const ourRate = Math.round((o.ourRateMin + rnd()*(o.ourRateMax-o.ourRateMin))/50000)*50000;
    let ourFlightNo;
    do{ ourFlightNo = String(1000+Math.floor(rnd()*8999)); } while(usedNo.has(ourFlightNo));
    dates.push(withOffset(o.dayOffsets[i], {
      key:`${routeKey}_d${i+1}`,
      ourRate, ourSeats:{ left: 1+Math.floor(rnd()*o.seatsTotal*0.35), total:o.seatsTotal },
      ourFlight:{ airline:pick(o.airlines), flightNo:ourFlightNo },
      flights,
    }));
  }
  return dates;
}

/* ============================== شبیه‌سازی «زمان دریافت» هر مورد ============================== */
/* هر تاریخ به‌صورت پیوسته توسط سامانه پردازش می‌شود؛ این مقدار زمان آخرین دریافت/پردازش را نشان می‌دهد */
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; } return h>>>0; }
const state_lastUpdated = {};
ROUTES.flatMap(r=>r.dates).forEach(d=>{
  const rnd = mulberry32(hashStr(d.key));
  const minutesAgo = 2 + Math.floor(rnd()*180); // بین ۲ دقیقه تا ۳ ساعت پیش
  state_lastUpdated[d.key] = Date.now() - minutesAgo*60000;
});
/* دو پیام تازه‌ی نمونه: زمان دریافتشان عمداً بسیار نزدیک به «الان» است تا در بالای کارتابل بنشینند
   (نه به‌خاطر تاریخ پرواز، بلکه چون تازه‌ترین پیام‌های دریافتی هستند) */
state_lastUpdated["ikat_d1"] = Date.now() - 1*60000;  // پیام تغییر نرخ کاسپین ۵۴۶ · ۷ تیر
state_lastUpdated["ikat_d6"] = Date.now() - 4*60000;  // پیام افزایش نرخ قشم‌ایر ۸۶۵۷ · ۱۵ تیر
/* کلیدهایی که به‌تازگی رسیده‌اند و هنوز باز نشده‌اند، نشان «جدید» می‌گیرند */
const state_freshKeys = new Set(["ikat_d1","ikat_d6"]);
function relativeTime(ts){
  if(!ts) return "—";
  const diff = Math.max(0, Date.now()-ts);
  const min = Math.floor(diff/60000);
  if(min<1) return "همین الان";
  if(min<60) return `${toFaNum(min)} دقیقه پیش`;
  const hours = Math.floor(min/60);
  if(hours<24) return `${toFaNum(hours)} ساعت پیش`;
  const days = Math.floor(hours/24);
  return `${toFaNum(days)} روز پیش`;
}

/* ============================== تحلیل ============================== */
function computeStats(flights){
  const prices = flights.map(f=>f.price);
  const min=Math.min(...prices), max=Math.max(...prices);
  const avg=Math.round(prices.reduce((a,b)=>a+b,0)/prices.length);
  const cheapest=flights.find(f=>f.price===min);
  return {min,max,avg,cheapest};
}
const AI_HEADLINES = {
  competitive: { text:"فاصله از کف بازار زیاد است — کاهش پیشنهاد می‌شود", tone:"down" },
  critical:    { text:"ظرفیت رو به اتمام — افزایش نرخ پیشنهاد می‌شود", tone:"up" },
  loose:       { text:"ظرفیت خالی بالاست — کاهش نرخ برای فروش سریع‌تر", tone:"down" },
  hold:        { text:"نرخ در محدوده‌ی مناسب بازار قرار دارد", tone:"flat" },
};
function aiSuggest(ourRate, ourSeats, stats){
  const freePct = Math.round((ourSeats.left/ourSeats.total)*100);
  const critical = freePct < 12, loose = freePct > 35;
  let target, reasoning, type;
  if(ourRate > stats.min*1.06 && !critical){
    type = "competitive";
    target = Math.round((stats.min*1.03)/10000)*10000;
    reasoning = `ارزان‌ترین رقیب فعال «${stats.cheapest.airline} ${stats.cheapest.flightNo}» با نرخ ${fmt(stats.min)} تومان پرواز می‌کند. نرخ فعلی شما حدود ${(((ourRate-stats.min)/stats.min)*100).toFixed(1)}٪ بالاتر از کف بازار است؛ نزدیک‌شدن به ${fmt(target)} تومان رقابت‌پذیری را حفظ می‌کند و همچنان زیر میانگین بازار (${fmt(stats.avg)} تومان) باقی می‌ماند.`;
  } else if(critical){
    type = "critical";
    target = Math.round((ourRate*1.05)/10000)*10000;
    reasoning = `فقط ${fmt(ourSeats.left)} صندلی از ${fmt(ourSeats.total)} باقی مانده (${fmt(freePct)}٪ ظرفیت آزاد) — تقاضا برای این تاریخ بالاست. با وجود میانگین بازار ${fmt(stats.avg)} تومان، کمبود ظرفیت افزایش نرخ تا ${fmt(target)} تومان را بدون از‌دست‌دادن مسافر توجیه می‌کند.`;
  } else if(loose){
    type = "loose";
    target = Math.round((stats.avg*0.97)/10000)*10000;
    reasoning = `${fmt(freePct)}٪ از ظرفیت این پرواز هنوز خالی است. میانگین بازار ${fmt(stats.avg)} تومان است؛ کاهش نرخ به ${fmt(target)} تومان (کمی زیر میانگین) می‌تواند سرعت فروش صندلی‌های باقی‌مانده را بالا ببرد.`;
  } else {
    type = "hold";
    target = ourRate;
    reasoning = `نرخ فعلی شما (${fmt(ourRate)} تومان) در محدوده‌ی منطقی بازار (کف ${fmt(stats.min)} تا میانگین ${fmt(stats.avg)} تومان) قرار دارد و ظرفیت باقی‌مانده (${fmt(freePct)}٪) متعادل است. تغییری پیشنهاد نمی‌شود.`;
  }
  const headline = AI_HEADLINES[type];
  return {target,reasoning,freePct,critical,loose,type,headline:headline.text,tone:headline.tone};
}
function alertIcon(tone){
  if(tone==="up") return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg>';
  if(tone==="down") return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="6 13 12 19 18 13"/></svg>';
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>';
}

/* ============================== وضعیت ============================== */

  route:"ikat",
  filter:"pending",
  search:"",
  openKey:null,
  ourRates: Object.fromEntries(ROUTES.flatMap(r=>r.dates).map(d=>[d.key,d.ourRate])),
  decisions:{},
  flags:{},
  managerMsgsRead:false,
  lastUpdated: state_lastUpdated,
  freshKeys: state_freshKeys,
  lastCheckTs: Math.max(...Object.values(state_lastUpdated)),
};
/* ترتیب کارتابل: نه بر اساس تاریخ پرواز، بلکه بر اساس ترتیب دریافت پیام —
   جدیدترین پیام (چه تصمیم‌گیری‌شده چه در انتظار) همیشه بالای فهرست می‌نشیند.
   موردی که تصمیم گرفته شده با زمان همان تصمیم مرتب می‌شود تا در تب «بررسی‌شده» هم
   جدیدترین رسیدگی‌ها بالا باشند. */
function sortByReceived(items){
  return [...items].sort((a,b)=>{
    const da = state.decisions[a.key], db = state.decisions[b.key];
    const ta = da ? (da.ts||0) : (state.lastUpdated[a.key]||0);
    const tb = db ? (db.ts||0) : (state.lastUpdated[b.key]||0);
    return tb - ta;
  });
}
const MANAGER_MESSAGES = [
  {from:"محمد کریمی", role:"مدیر نرخ‌گذاری", date:"۳ تیر", text:"لطفاً نرخ مسیر تهران–استانبول رو تا پایان امروز نهایی کن، چند تا فروشنده منتظرن."},
  {from:"محمد کریمی", role:"مدیر نرخ‌گذاری", date:"۲۹ خرداد", text:"گزارش عملکرد هفته‌ی گذشته‌ت رو دیدم، خیلی خوب بود. همینطور ادامه بده."},
  {from:"محمد کریمی", role:"مدیر نرخ‌گذاری", date:"۲۵ خرداد", text:"برای مسیر مشهد یه نوسان نرخ داریم، یه نگاهی به کارتابل بنداز."},
];
function getRoute(){ return ROUTES.find(r=>r.key===state.route); }
function getDates(){ return getRoute().dates; }
function findDate(key){ return ROUTES.flatMap(r=>r.dates).find(d=>d.key===key); }
function pendingCount(){ return getDates().filter(d=>!state.decisions[d.key]).length; }
function decidedCount(){ return getDates().filter(d=>state.decisions[d.key]).length; }
function isUrgent(d){
  if(state.decisions[d.key]) return false;
  if(state.flags[d.key]) return true;
  const stats = computeStats(d.flights);
  return aiSuggest(state.ourRates[d.key], d.ourSeats, stats).type === "critical";
}
function urgentCount(){ return getDates().filter(isUrgent).length; }
function allPendingCount(){ return ROUTES.flatMap(r=>r.dates).filter(d=>!state.decisions[d.key]).length; }

/* ============================== تصمیم ============================== */
function applyDecision(dateKey, status, newRate, reasoning, note){
  state.ourRates[dateKey] = newRate;
  state.decisions[dateKey] = { status, reasoning, ts: Date.now() };
  const d = findDate(dateKey);
  const labels = { approved:"پیشنهاد تأیید شد", rejected:"بدون تغییر باقی ماند", manual:"نرخ دستی ثبت شد" };
  showBanner(status, labels[status], `${d.jalali} (${d.weekday}) · نرخ: ${fmt(newRate)} تومان${note||""}`);
  renderRouteChips("routeScrollInbox"); renderRouteChips("routeScrollReports");
  if(state.tab==="reports") renderReports();
  if(state.openKey===dateKey){
    renderDetail(dateKey);
    setTimeout(()=>{
      if(state.openKey===dateKey){
        closeDetail();
        state.filter = "decided";
        document.querySelectorAll(".seg-btn").forEach(b=>b.classList.toggle("active", b.dataset.filter==="decided"));
      }
      renderInboxList();
    }, 550);
  } else {
    renderInboxList();
  }
}

/* ============================== سوایپ + لمس طولانی روی ردیف ============================== */
function attachRowGestures(rowContent, wrap, key, onApprove, onReject){
  let startX=0, dx=0, dragging=false, longPressFired=false, timer=null;
  const max=88;
  rowContent.addEventListener("pointerdown",(e)=>{
    dragging=true; startX=e.clientX; dx=0; longPressFired=false;
    rowContent.setPointerCapture(e.pointerId);
    rowContent.style.transition="none";
    timer = setTimeout(()=>{
      if(dragging && Math.abs(dx)<10){
        longPressFired = true;
        rowContent.style.transform = "translateX(0)";
        openQuickSheet(key);
      }
    }, 480);
  });
  rowContent.addEventListener("pointermove",(e)=>{
    if(!dragging || longPressFired) return;
    dx = e.clientX - startX;
    if(Math.abs(dx)>10) clearTimeout(timer);
    dx = Math.max(-max, Math.min(max, dx));
    rowContent.style.transform = `translateX(${dx}px)`;
    const bg = wrap.querySelector(".row-bg");
    const appr = bg.querySelector(".approve"), rej = bg.querySelector(".reject");
    if(dx < -8){ appr.style.opacity = Math.min(1, -dx/max); rej.style.opacity=0; bg.style.background="#30B855"; }
    else if(dx > 8){ rej.style.opacity = Math.min(1, dx/max); appr.style.opacity=0; bg.style.background="#8E8E93"; }
    else { appr.style.opacity=0; rej.style.opacity=0; }
  });
  const end = ()=>{
    clearTimeout(timer);
    if(!dragging) return;
    dragging=false;
    if(longPressFired){ dx=0; return; }
    rowContent.style.transition="transform .25s ease";
    rowContent.style.transform="translateX(0)";
    if(dx < -60) onApprove();
    else if(dx > 60) onReject();
    dx=0;
    setTimeout(()=>{ const bg=wrap.querySelector(".row-bg"); if(bg){ bg.querySelectorAll(".row-bg-action").forEach(a=>a.style.opacity=0); } },200);
  };
  rowContent.addEventListener("pointerup", end);
  rowContent.addEventListener("pointercancel", ()=>{ clearTimeout(timer); dragging=false; });
}

function renderInboxList(){
  const host = document.getElementById("inboxList");
  let items = getDates();
  if(state.filter==="pending") items = items.filter(d=>!state.decisions[d.key]);
  if(state.filter==="urgent") items = items.filter(isUrgent);
  if(state.filter==="decided") items = items.filter(d=>state.decisions[d.key]);
  if(state.search.trim()){
    const q = state.search.trim();
    items = items.filter(d=> (d.jalali+d.weekday).includes(q) || d.flights.some(f=>f.airline.includes(q)));
  }
  items = sortByReceived(items);

  document.querySelectorAll(".seg-btn").forEach(b=>{
    if(b.dataset.filter==="pending") b.textContent = `در انتظار ${fmt(pendingCount())}`;
    if(b.dataset.filter==="urgent") b.textContent = urgentCount()>0 ? `فوری ${fmt(urgentCount())}` : "فوری";
    if(b.dataset.filter==="decided") b.textContent = `بررسی‌شده ${fmt(decidedCount())}`;
    if(b.dataset.filter==="all") b.textContent = `همه ${fmt(getDates().length)}`;
  });
  const statPending = document.getElementById("statPending");
  const statUrgent = document.getElementById("statUrgent");
  const statDecided = document.getElementById("statDecided");
  if(statPending) statPending.textContent = fmt(pendingCount());
  if(statUrgent) statUrgent.textContent = fmt(urgentCount());
  if(statDecided) statDecided.textContent = fmt(decidedCount());
  document.querySelectorAll(".status-stat").forEach(b=>b.classList.toggle("active-filter", b.dataset.filter===state.filter));
  updateNotifDot();

  if(items.length===0){
    host.innerHTML = `<div class="empty">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <div>موردی برای نمایش نیست</div>
    </div>`;
    return;
  }

  host.innerHTML = items.map(d=>{
    const decision = state.decisions[d.key];
    const status = decision ? decision.status : "pending";
    const stats = computeStats(d.flights);
    const ai = aiSuggest(state.ourRates[d.key], d.ourSeats, stats);
    const delta = ai.target - state.ourRates[d.key];
    const badgeCls = delta>0 ? "delta-up" : delta<0 ? "delta-down" : "delta-flat";
    const badgeTxt = delta===0 ? "بدون تغییر" : (delta>0? "+":"−")+fmt(Math.abs(delta));
    const statusTxt = { pending:"نیازمند تصمیم", approved:"تأیید شد", rejected:"بدون تغییر", manual:"نرخ دستی" }[status];
    const updatedTxt = decision ? `تصمیم: ${relativeTime(decision.ts||state.lastUpdated[d.key])}` : `دریافت: ${relativeTime(state.lastUpdated[d.key])}`;
    const flagged = !!state.flags[d.key];
    const isUnread = status==="pending";
    const isFresh = isUnread && state.freshKeys && state.freshKeys.has(d.key);
    const ourFlightTxt = d.ourFlight ? `${d.ourFlight.airline} <span class="num">${d.ourFlight.flightNo}</span>` : "";
    return `
    <div class="row-wrap ${flagged?"flagged":""}" data-key="${d.key}">
      <div class="row-bg">
        <span class="row-bg-action reject">رد سریع ✕</span>
        <span class="row-bg-action approve">تأیید سریع ✓</span>
      </div>
      <div class="row-content" data-key="${d.key}">
        <span class="alert-badge ${ai.tone} ${isUnread?'unread':''}">${alertIcon(ai.tone)}</span>
        <div class="row-main">
          <div class="row-top">
            <span class="row-title-wrap">
              <span class="row-title">${d.jalali}</span>
              <span class="row-weekday">${d.weekday}</span>
              ${flagged?'<span class="row-flag-ico">⚑</span>':''}
              ${isFresh?'<span class="row-new-badge">جدید</span>':''}
            </span>
            ${ourFlightTxt?`<span class="row-time">${ourFlightTxt}</span>`:""}
          </div>
          <div class="row-alert-line">${ai.headline}</div>
          <div class="row-bottom">
            <span class="row-target"><span class="num">${fmt(ai.target)}</span> تومان</span>
            <span class="row-badge ${badgeCls}">${badgeTxt}</span>
            <span class="row-status-txt">${statusTxt} · ${updatedTxt}</span>
          </div>
        </div>
        <span class="row-chevron">‹</span>
      </div>
    </div>`;
  }).join("");

  host.querySelectorAll(".row-wrap").forEach(wrap=>{
    const key = wrap.dataset.key;
    const content = wrap.querySelector(".row-content");
    content.addEventListener("click", (e)=>{
      if(Math.abs(parseFloat((content.style.transform.match(/-?\d+/)||[0])[0]))>4) return;
      openDetail(key);
    });
    const d = findDate(key);
    const stats = computeStats(d.flights);
    const ai = aiSuggest(state.ourRates[key], d.ourSeats, stats);
    attachRowGestures(content, wrap, key,
      ()=> openScopeSheet(key, ai.target, ai.reasoning),
      ()=> applyDecision(key,"rejected", state.ourRates[key], ai.reasoning, "")

  });
}

let checkingNow = false;
function checkNowAllRates(){
  if(checkingNow) return;
  checkingNow = true;
  const btn = document.getElementById("btnCheckNow");
  const label = document.getElementById("lastCheckLabel");
  btn.classList.add("loading"); btn.disabled = true;
  label.textContent = "در حال بررسی…";
  setTimeout(()=>{
    const now = Date.now();
    /* «بررسی الان» یعنی سامانه پیام‌های تازه را استعلام می‌کند — نه اینکه همه‌ی موارد را
       دست‌کاری کند. فقط چند مورد در انتظار به‌صورت تصادفی «پیام تازه» تلقی می‌شوند و با
       زمان دریافت جدید به بالای کارتابل می‌آیند؛ بقیه‌ی موارد دست‌نخورده باقی می‌مانند. */
    const candidates = ROUTES.flatMap(r=>r.dates).filter(d=>!state.decisions[d.key]);
    const freshCount = Math.min(candidates.length, 1+Math.floor(Math.random()*2));
    const picked = [...candidates].sort(()=>Math.random()-0.5).slice(0, freshCount);
    picked.forEach(d=>{ state.lastUpdated[d.key] = now; state.freshKeys.add(d.key); });
    state.lastCheckTs = now;
    updateLastCheckLabel();
    renderDateStrip();
    renderInboxList();
    btn.classList.remove("loading"); btn.disabled = false;
    checkingNow = false;
    const pend = pendingCount();
    const msg = picked.length>0
      ? `${fmt(picked.length)} پیام تازه دریافت شد و به بالای کارتابل آمد — ${fmt(pend)} مورد در این بازار در انتظار تصمیم شماست`
      : "بررسی شد، پیام تازه‌ای دریافت نشد.";
    showBanner("manual","بررسی کامل شد", msg);
  }, 1300);
}
document.getElementById("btnCheckNow").addEventListener("click", checkNowAllRates);
updateLastCheckLabel();
setInterval(updateLastCheckLabel, 30000);

/* ============================== راه‌اندازی ============================== */
updateRouteHeader();
renderRouteChips("routeScrollInbox");
renderRouteChips("routeScrollReports");
renderDateStrip();
renderInboxList();
</script>
</body>
</html>
