function yandexRouteUrl(fromArea, toArea) {
  const from = AREA_COORDS[fromArea];
  const to = AREA_COORDS[toArea];
  if (!from || !to) return null;
  return `https://yandex.com/maps/?rtext=${from[0]},${from[1]}~${to[0]},${to[1]}&rtt=mt`;
}

// Used by Travel Day Mode: a one-tap "walk from wherever I'm standing right
// now" link. Leaving the origin (~) empty tells Yandex Maps to use the
// phone's live location instead of a fixed area centroid — the area-level
// yandexRouteUrl above is for planning ahead of time, this one is for
// live navigation to one exact spot while already out in the city.
function yandexNavUrl(coord) {
  if (!coord) return null;
  return `https://yandex.com/maps/?rtext=~${coord[0]},${coord[1]}&rtt=pd`;
}

function addDaysToDate(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

// ---- Flight price mock (demo data only — no live fares available inside
// the artifact sandbox; deterministic so it doesn't flicker on re-render) ----
function hashDate(dateStr) {
  let h = 0;
  for (let i = 0; i < dateStr.length; i++) h = (h * 31 + dateStr.charCodeAt(i)) >>> 0;
  return h;
}
function priceForDate(date) {
  const key = date.toISOString().slice(0, 10);
  return 210 + (hashDate(key) % 140); // $210–$350 per person, demo range
}
function buildFlightDays() {
  const days = [];
  for (let i = 1; i <= 14; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    days.push({ date: d, key: d.toISOString().slice(0, 10), price: priceForDate(d), label: d.toLocaleDateString("fa-IR", { weekday: "short", day: "numeric", month: "short" }) });
  }
  return days;
}

// ---- Weather mock (demo heuristic only — no live forecast API available
// inside the artifact sandbox). Derives a plausible daily condition/temp
// range from the season implied by the chosen flight month, then seeds a
// per-day variation off the same deterministic hashDate() used for flight
// prices — so it's stable across re-renders but still varies day to day.
const SEASON_TEMP_RANGE = {
  winter: [4, 11],
  spring: [12, 19],
  summer: [23, 31],
  autumn: [13, 20],
};
const WEATHER_CONDITIONS = {
  winter: [
    { Icon: CloudRain, label: "بارونی" },
    { Icon: Cloud, label: "ابری" },
    { Icon: CloudSnow, label: "احتمال برف" },
  ],
  spring: [
    { Icon: CloudSun, label: "نیمه‌ابری" },
    { Icon: CloudRain, label: "رگبار کوتاه" },
    { Icon: Sun, label: "آفتابی" },
  ],
  summer: [
    { Icon: Sun, label: "آفتابی" },
    { Icon: Sun, label: "گرم و صاف" },
    { Icon: CloudSun, label: "نیمه‌ابری" },
  ],
  autumn: [
    { Icon: CloudSun, label: "نیمه‌ابری" },
    { Icon: CloudRain, label: "بارون پراکنده" },
    { Icon: Cloud, label: "ابری" },
  ],
};
function weatherForDay(flightDate, dayIndex) {
  if (!flightDate) return null;
  const season = seasonForMonth(flightDate.getMonth());
  const seedDate = new Date(flightDate);
  seedDate.setDate(seedDate.getDate() + dayIndex);
  const seed = hashDate(seedDate.toISOString().slice(0, 10));
  const [lo, hi] = SEASON_TEMP_RANGE[season];
  const temp = lo + (seed % (hi - lo + 1));
  const conditions = WEATHER_CONDITIONS[season];
  const condition = conditions[seed % conditions.length];
  return { temp, season, ...condition };
}

const DEFAULT_TRAVELERS = 2;

function estimateCost({ selected, hotel, nights, flightPrice }) {
  const travelers = DEFAULT_TRAVELERS;
  const rooms = Math.max(1, Math.ceil(travelers / 2));
  const hotelTotal = hotel ? hotel.nightlyUSD * rooms * nights : 0;
  const flightTotal = flightPrice ? flightPrice * travelers : 0;
  const foodTotal = travelers * nights * 20;
  const transportTotal = travelers * nights * 6;
  const activitiesTotal = selected.filter((s) => s.ticketPriceUSD).reduce((sum, s) => sum + s.ticketPriceUSD * travelers, 0);
  const total = hotelTotal + flightTotal + foodTotal + transportTotal + activitiesTotal;
  return {
    total,
    parts: [
      { label: "بلیط پرواز", value: flightTotal, color: T.tile },
      { label: "اقامت", value: hotelTotal, color: T.clay },
      { label: "غذا", value: foodTotal, color: T.gold },
      { label: "حمل‌ونقل محلی", value: transportTotal, color: T.tileDeep },
      { label: "ورودی و فعالیت‌ها", value: activitiesTotal, color: T.inkSoft },
    ],
  };
}

/* ---------------------------------------------------------------
   POSTER — a downloadable, Instagram-story-shaped (1080×1920) PNG
   summary of the whole trip, drawn in the exact strait palette
   (clay/tile/gold) with the same wavy-seam motif used in the hero
   and checklist spine. Pure canvas 2D, no image assets required.
------------------------------------------------------------------*/
const POSTER_W = 1080;
const POSTER_H = 1920;

function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function wrapCanvasText(ctx, text, maxWidth) {
  const words = String(text || "").split(" ");
  const lines = [];
  let line = "";
  words.forEach((w) => {
    const test = line ? `${line} ${w}` : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

function drawTripPosterSync(canvas, { dayBundles, hotel, flightDay, nights, destName = "استانبول" }) {
  if (!canvas) return;
  canvas.width = POSTER_W;
  canvas.height = POSTER_H;
  const ctx = canvas.getContext("2d");
  ctx.direction = "rtl";

  ctx.fillStyle = T.paper;
  ctx.fillRect(0, 0, POSTER_W, POSTER_H);

  // Hero band — the strait: clay meets tile behind a wavy seam
  const heroH = 640;
  const heroGrad = ctx.createLinearGradient(0, 0, POSTER_W, heroH);
  heroGrad.addColorStop(0, T.clay);
  heroGrad.addColorStop(1, T.tileDeep);
  ctx.fillStyle = heroGrad;
  ctx.fillRect(0, 0, POSTER_W, heroH);

  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.lineWidth = 5;
  ctx.beginPath();
  for (let y = 0; y <= heroH; y += 4) {
    const x = POSTER_W / 2 + Math.sin(y / 28) * 28;
    if (y === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.textAlign = "center";
  ctx.fillStyle = "white";
  ctx.font = "800 72px Vazirmatn, sans-serif";
  ctx.fillText(destName, POSTER_W / 2, 170);
  ctx.font = "500 32px Vazirmatn, sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.88)";
  ctx.fillText("شهری روی دو قاره", POSTER_W / 2, 220);

  ctx.font = "800 210px Vazirmatn, sans-serif";
  ctx.fillStyle = T.gold;
  ctx.fillText(String(nights || dayBundles.length || "–"), POSTER_W / 2, 460);
  ctx.font = "600 38px Vazirmatn, sans-serif";
  ctx.fillStyle = "white";
  ctx.fillText("شب سفر", POSTER_W / 2, 526);

  // Stats card
  const cardY = heroH + 36;
  const cardH = 300;
  ctx.fillStyle = T.panel;
  roundRectPath(ctx, 48, cardY, POSTER_W - 96, cardH, 36);
  ctx.fill();

  const totalStops = dayBundles.reduce((sum, b) => sum + (b.spots ? b.spots.length : 0), 0);
  ctx.textAlign = "right";
  let statY = cardY + 68;
  ctx.font = "700 36px Vazirmatn, sans-serif";
  ctx.fillStyle = T.ink;
  ctx.fillText(`${totalStops} لوکیشن سفر`, POSTER_W - 68, statY);

  if (hotel) {
    statY += 62;
    ctx.font = "700 36px Vazirmatn, sans-serif";
    ctx.fillStyle = T.ink;
    ctx.fillText(hotel.name, POSTER_W - 68, statY);
    statY += 40;
    ctx.font = "400 26px Vazirmatn, sans-serif";
    ctx.fillStyle = T.inkSoft;
    ctx.fillText(hotel.area, POSTER_W - 68, statY);
  }
  if (flightDay) {
    statY += 62;
    ctx.font = "700 36px Vazirmatn, sans-serif";
    ctx.fillStyle = T.ink;
    ctx.fillText(`${flightDay.label} · $${flightDay.price}`, POSTER_W - 68, statY);
  }

  // Day-by-day list
  let y = cardY + cardH + 76;
  dayBundles.slice(0, 8).forEach((b, i) => {
    const color = i % 2 === 0 ? T.tile : T.clay;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(POSTER_W - 74, y - 12, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "white";
    ctx.font = "700 22px monospace";
    ctx.textAlign = "center";
    ctx.fillText(String(i + 1), POSTER_W - 74, y - 4);

    ctx.textAlign = "right";
    ctx.font = "600 30px Vazirmatn, sans-serif";
    ctx.fillStyle = T.ink;
    const lines = wrapCanvasText(ctx, b.title || "", POSTER_W - 230);
    ctx.fillText(lines[0] || "", POSTER_W - 118, y);
    y += 72;
  });

  // Footer wave + brand
  ctx.strokeStyle = T.line;
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let x = 48; x <= POSTER_W - 48; x += 4) {
    const yy = POSTER_H - 92 + Math.sin(x / 30) * 8;
    if (x === 48) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
  }
  ctx.stroke();
  ctx.textAlign = "center";
  ctx.font = "500 24px Vazirmatn, sans-serif";
  ctx.fillStyle = T.inkSoft;
  ctx.fillText(`ساخته‌شده با Tripza — برنامه‌ریز سفر ${destName}`, POSTER_W / 2, POSTER_H - 38);
}

/* ---------------------------------------------------------------
   TRIP LOGIC — the planner decides pacing, not the user. Nights and
   the day-by-day grouping are computed deterministically from the
   selected spots (area proximity), so the structure never depends
   on the AI call succeeding — only the narrative text does.
------------------------------------------------------------------*/
function computeNights(selected) {
  if (selected.length < 3) return 3;
  const areaCount = new Set(selected.map((s) => s.area)).size;
  const base = Math.ceil(selected.length / 2.3);
  const spread = areaCount >= 4 ? 1 : 0;
  return Math.min(8, Math.max(3, base + spread));
}

function nightsReason(selected, nights) {
  const areaCount = new Set(selected.map((s) => s.area)).size;
  return `با ${selected.length} لوکیشن انتخابی در ${areaCount} منطقه، ${nights} شب کافیه تا بدون عجله و پیاده‌روی زیاد همه‌شون رو ببینید.`;
}

function clusterDays(selected, nights) {
  const byArea = {};
  selected.forEach((s) => { (byArea[s.area] ||= []).push(s); });
  const ordered = Object.values(byArea).flat();
  const perDay = Math.max(1, Math.ceil(ordered.length / nights));
  const days = [];
  for (let i = 0; i < ordered.length; i += perDay) {
    days.push(ordered.slice(i, i + perDay));
  }
  return days;
}

function dayArea(dayGroup) {
  const counts = {};
  dayGroup.forEach((s) => { counts[s.area] = (counts[s.area] || 0) + 1; });
  return Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
}

function buildTransitRoute(hotel, area) {
  if (!hotel) return null;
  if (hotel.area === area) {
    return { same: true, desc: "امروز نیازی به وسیله نقلیه نیست؛ همه‌چی با پیاده‌روی از هتل در دسترسه." };
  }
  const to = TRANSIT_HUBS[area];
  if (!to) return null;
  const from = TRANSIT_HUBS[hotel.area];
  return {
    same: false,
    mode: to.mode,
    from: from ? { station: from.station, line: from.line } : { station: hotel.area, line: "" },
    to: { station: to.station, line: to.line },
    desc: to.desc,
  };
}

function sortedHotels(selected) {
  const freq = {};
  selected.forEach((s) => { freq[s.area] = (freq[s.area] || 0) + 1; });
  return [...HOTELS].sort((a, b) => (freq[b.area] || 0) - (freq[a.area] || 0));
}

/* computeBudget replaced by estimateCost() above, which derives cost from
   the chosen hotel, chosen flight date, and ticketed activities instead
   of a user-set budget slider. */

/* ---------------------------------------------------------------
   PRECISE SCHEDULING — real distances (haversine, in km) between
   consecutive stops in a day drive both the "~15 دقیقه" leg chip and
   the exact start/end clock times per stop. Times cascade: editing
   one stop's start time shifts every stop after it in that same day.
------------------------------------------------------------------*/
function distanceKm(a, b) {
  if (!a || !b) return 1;
  const R = 6371;
  const dLat = ((b[0] - a[0]) * Math.PI) / 180;
  const dLon = ((b[1] - a[1]) * Math.PI) / 180;
  const lat1 = (a[0] * Math.PI) / 180;
  const lat2 = (b[0] * Math.PI) / 180;
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

// Under ~1.1km assumes walking (~4.5km/h); beyond that assumes a tram/
// ferry/funicular hop with ~6min of wait/transfer baked in.
function estimateTravelMinutes(km) {
  if (km <= 1.1) return Math.max(5, Math.round((km / 4.5) * 60));
  return Math.max(10, Math.round((km / 16) * 60) + 6);
}

function bearingDeg(a, b) {
  const φ1 = (a[0] * Math.PI) / 180, φ2 = (b[0] * Math.PI) / 180;
  const λ1 = (a[1] * Math.PI) / 180, λ2 = (b[1] * Math.PI) / 180;
  const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
  return ((Math.atan2(y, x) * 180) / Math.PI + 360) % 360;
}
function angleDiff(a, b) {
  const d = Math.abs(a - b) % 360;
  return d > 180 ? 360 - d : d;
}

// Flags a day whose stop order zig-zags — i.e. the direction of travel
// swings by more than ~110° between two consecutive legs, meaning the
// traveler would double back across ground already covered.
function detectBacktrack(spots) {
  if (spots.length < 3) return false;
  for (let i = 0; i < spots.length - 2; i++) {
    const a = SPOT_COORDS[spots[i].id], b = SPOT_COORDS[spots[i + 1].id], c = SPOT_COORDS[spots[i + 2].id];
    if (!a || !b || !c) continue;
    if (angleDiff(bearingDeg(a, b), bearingDeg(b, c)) > 110) return true;
  }
  return false;
}

function addMinutes(hhmm, mins) {
  const [h, m] = hhmm.split(":").map(Number);
  const total = (((h * 60 + m + mins) % 1440) + 1440) % 1440;
  return `${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`;
}

const DEFAULT_DURATION_MIN = {
  "تاریخی": 90,
  "عکاسی": 45,
  "خرید": 75,
  "غذا": 90,
  "بسفر و طبیعت": 120,
};
const defaultDurationFor = (spot) => DEFAULT_DURATION_MIN[spot.tag] || 60;

// Builds the per-stop clock schedule for one day, chaining off either the
// previous stop's computed end time or a manual override the traveler typed
// in — so nudging one stop's start time cascades through the rest of the day.
function scheduleForBundle(bundle, overrides) {
  let cursor = "09:00";
  return bundle.spots.map((s, i) => {
    let leg = null;
    if (i > 0) {
      const km = distanceKm(SPOT_COORDS[bundle.spots[i - 1].id], SPOT_COORDS[s.id]);
      const minutes = estimateTravelMinutes(km);
      leg = { km, minutes };
      cursor = addMinutes(cursor, minutes);
    }
    const start = overrides[`${bundle.key}-${s.id}`] || cursor;
    const duration = defaultDurationFor(s);
    const end = addMinutes(start, duration);
    cursor = end;
    return { spot: s, start, end, duration, leg };
  });
}

function reorderArray(arr, fromIndex, toIndex) {
  const copy = [...arr];
  const [moved] = copy.splice(fromIndex, 1);
  copy.splice(toIndex, 0, moved);
  return copy;
}

/* ---------------------------------------------------------------
   ROUTE AUTO-OPTIMIZE — a simple greedy nearest-neighbor pass over
   a day's stops, starting from the hotel's area (or the day's first
   stop if there's no hotel yet). This is intentionally the same
   lightweight heuristic real trip planners use for a one-tap "sort
   my day" action: not a true TSP solve, just "always walk to the
   closest thing you haven't seen yet" — which is exactly what kills
   the zig-zag backtracking that detectBacktrack() flags.
------------------------------------------------------------------*/
function nearestNeighborOrder(spots, startCoord) {
  if (spots.length <= 2) return spots;
  const remaining = [...spots];
  const ordered = [];
  let current = startCoord || SPOT_COORDS[remaining[0].id] || null;
  while (remaining.length) {
    let bestIdx = 0;
    let bestDist = Infinity;
    remaining.forEach((s, i) => {
      const coord = SPOT_COORDS[s.id];
      const d = current && coord ? distanceKm(current, coord) : 0;
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    });
    const [next] = remaining.splice(bestIdx, 1);
    ordered.push(next);
    current = SPOT_COORDS[next.id] || current;
  }
  return ordered;
}

   PACKING CHECKLIST — a short base list plus a few extra items
   pulled in by whichever interests/tags are actually in the trip
   (bazaar haggling cash, mosque headscarf, Bosphorus windbreaker...).
------------------------------------------------------------------*/
const PACKING_BASE = [
  "پاسپورت و پرینت رزرو هتل/پرواز",
  "پریز تبدیل (نوع C/F رایج در ترکیه)",
  "کفش پیاده‌روی راحت",
  "پاوربانک",
];
const PACKING_BY_TAG = {
  "خرید": ["کیف پارچه‌ای اضافه برای خریدها", "نقد لیر/یورو برای چانه‌زدن"],
  "بسفر و طبیعت": ["ژاکت بادگیر (باد بسفر سرده)", "عینک آفتابی"],
  "تاریخی": ["روسری/شال برای ورود به مساجد", "جوراب اضافه (جلوی مسجد کفش درمیارید)"],
  "عکاسی": ["شارژر/باتری اضافه دوربین", "دستمال لنز"],
  "غذا": ["کمک‌هاضم یا آنتی‌اسید", "دستمال مرطوب"],
};

// Seasonal add-ons keyed off the actual month of the chosen flight date —
// Istanbul swings from damp/cold winters to hot/dry summers, so the same
// activity-based list needs different layers depending on when you fly.
const SEASONAL_PACKING = {
  winter: ["کاپشن گرم ضدآب", "شال‌گردن و دستکش", "لایه زیرپوش گرم"],
  spring: ["چتر کوچک تاشو (بارون بهاره)", "ژاکت سبک برای هوای متغیر"],
  summer: ["کرم ضدآفتاب SPF بالا", "کلاه لبه‌دار و عینک آفتابی", "لباس نخی و سبک"],
  autumn: ["ژاکت سبک ضدباد", "چتر جمع‌وجور"],
};
function seasonForMonth(monthIndex) {
  if ([11, 0, 1].includes(monthIndex)) return "winter";
  if ([2, 3, 4].includes(monthIndex)) return "spring";
  if ([5, 6, 7].includes(monthIndex)) return "summer";
  return "autumn";
}
const SEASON_LABEL = { winter: "زمستانی", spring: "بهاری", summer: "تابستانی", autumn: "پاییزی" };

function buildPackingList(selectedSpots, interests, flightDate) {
  const tags = new Set([...(interests || []), ...selectedSpots.map((s) => s.tag)]);
  const items = [...PACKING_BASE];
  tags.forEach((tag) => {
    (PACKING_BY_TAG[tag] || []).forEach((it) => { if (!items.includes(it)) items.push(it); });
  });
  if (flightDate) {
    const season = seasonForMonth(flightDate.getMonth());
    (SEASONAL_PACKING[season] || []).forEach((it) => { if (!items.includes(it)) items.push(it); });
  }
  return items;
}

/* ---------------------------------------------------------------
   Drag-to-reorder list — generic, pointer-events based (works with
   both mouse and touch, unlike native HTML5 drag which iOS Safari
   doesn't support on arbitrary elements). Press the grip handle,
   drag over a sibling row, and the two swap places live; lift your
   finger/mouse to drop. Used for both day order and stop order.
------------------------------------------------------------------*/
function DragReorderList({ items, getKey, onReorder, renderItem, className }) {
  const [draggingKey, setDraggingKey] = useState(null);
  const dragState = useRef({ fromIndex: -1 });

  const startDrag = (e, index) => {
    e.preventDefault();
    dragState.current.fromIndex = index;
    setDraggingKey(getKey(items[index]));
    e.currentTarget.setPointerCapture?.(e.pointerId);
  };

  const onPointerMove = (e) => {
    if (dragState.current.fromIndex < 0) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const row = el && el.closest("[data-drag-index]");
    if (!row) return;
    const hoverIndex = Number(row.getAttribute("data-drag-index"));
    const fromIndex = dragState.current.fromIndex;
    if (!Number.isNaN(hoverIndex) && hoverIndex !== fromIndex) {
      onReorder(reorderArray(items, fromIndex, hoverIndex));
      dragState.current.fromIndex = hoverIndex;
    }
  };

  const endDrag = () => {
    dragState.current.fromIndex = -1;
    setDraggingKey(null);
  };

  return (
    <div className={className} onPointerMove={onPointerMove} onPointerUp={endDrag} onPointerCancel={endDrag}>
      {items.map((item, index) => {
        const key = getKey(item);
        return (
          <div
            key={key}
            data-drag-index={index}
            style={{
              opacity: draggingKey === key ? 0.5 : 1,
              transform: draggingKey === key ? "scale(1.02)" : "scale(1)",
              transition: "opacity .15s ease, transform .15s ease",
            }}
          >
            {renderItem(item, index, (e) => startDrag(e, index))}
          </div>
        );
      })}
    </div>
  );
}

/* ---------------------------------------------------------------
   Mini interactive trip map — plain SVG, no external tiles (the
   artifact sandbox can't reliably load a live tile server), but
   built from the same real coordinates used for distance/backtrack
   math above. Each day gets its own color-coded route line; tapping
   a pin scrolls to that day's card.
------------------------------------------------------------------*/
function buildProjection(coordsList, width, height, padding) {
  const lats = coordsList.map((c) => c[0]);
  const lons = coordsList.map((c) => c[1]);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const latSpan = maxLat - minLat || 1;
  const lonSpan = maxLon - minLon || 1;
  return ([lat, lon]) => [
    padding + ((lon - minLon) / lonSpan) * (width - 2 * padding),
    padding + ((maxLat - lat) / latSpan) * (height - 2 * padding),
  ];
}

function TripMap({ dayBundles, hotel, onPinClick }) {
  const W = 320, H = 210, PAD = 26;
  const allCoords = [];
  dayBundles.forEach((b) => b.spots.forEach((s) => { if (SPOT_COORDS[s.id]) allCoords.push(SPOT_COORDS[s.id]); }));
  if (hotel && AREA_COORDS[hotel.area]) allCoords.push(AREA_COORDS[hotel.area]);
  if (allCoords.length < 2) return null;
  const project = buildProjection(allCoords, W, H, PAD);

  return (
    <div className="rounded-2xl p-4 mb-4" style={{ background: T.panel, border: `1px solid ${T.line}`, boxShadow: T.shadowMd }}>
      <p className="text-sm mb-1 flex items-center gap-2"><MapIcon size={15} style={{ color: T.tile }} /> نقشه سفر</p>
      <p className="text-[11px] mb-3" style={{ color: T.inkSoft }}>هر رنگ یعنی یک روز؛ روی هر پین بزن تا برنامه همون روز رو ببینی.</p>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full rounded-xl" style={{ background: T.mist }}>
        {dayBundles.map((b, bi) => {
          const color = bi % 2 === 0 ? T.tile : T.clay;
          const pts = b.spots.map((s) => SPOT_COORDS[s.id]).filter(Boolean).map(project);
          if (pts.length < 2) return null;
          return (
            <polyline
              key={b.key}
              points={pts.map((p) => p.join(",")).join(" ")}
              fill="none"
              stroke={color}
              strokeWidth="2"
              strokeDasharray="1 6"
              strokeLinecap="round"
              opacity="0.8"
            />
          );
        })}
        {hotel && AREA_COORDS[hotel.area] && (() => {
          const [x, y] = project(AREA_COORDS[hotel.area]);
          return (
            <g>
              <circle cx={x} cy={y} r="7" fill={T.night} />
              <circle cx={x} cy={y} r="7" fill="none" stroke="white" strokeWidth="1.5" />
            </g>
          );
        })()}
        {dayBundles.map((b, bi) => {
          const color = bi % 2 === 0 ? T.tile : T.clay;
          return b.spots.map((s, si) => {
            const coord = SPOT_COORDS[s.id];
            if (!coord) return null;
            const [x, y] = project(coord);
            return (
              <g key={`${b.key}-${s.id}`} onClick={() => onPinClick(b.key)} style={{ cursor: "pointer" }}>
                <circle cx={x} cy={y} r="9" fill={color} stroke="white" strokeWidth="1.5" />
                <text x={x} y={y + 3} textAnchor="middle" fontSize="8" fontFamily="monospace" fill="white">{si + 1}</text>
              </g>
            );
          });
        })}
      </svg>
      <div className="flex flex-wrap gap-x-3 gap-y-1 mt-2">
        {hotel && (
          <span className="flex items-center gap-1 text-[10px]" style={{ color: T.inkSoft }}>
            <span className="w-2 h-2 rounded-full" style={{ background: T.night }} /> هتل
          </span>
        )}
        {dayBundles.map((b, bi) => (
          <span key={b.key} className="flex items-center gap-1 text-[10px]" style={{ color: T.inkSoft }}>
            <span className="w-2 h-2 rounded-full" style={{ background: bi % 2 === 0 ? T.tile : T.clay }} /> روز {bi + 1}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   TRAVEL DAY MODE — the "trip is actually happening" view. Everything
   else in the results screen is a planning tool (drag to reorder,
   editable times, backtrack warnings); none of that is useful while
   standing on a street corner in Balat. This view instead surfaces
   exactly one thing: the stop you should be at right now, a button
   that opens live walking directions to it from wherever the phone
   currently is, and a big "seen it" action that advances to the next
   one. "Visited" state persists per stop so closing/reopening the
   view (or switching days) doesn't lose progress.
------------------------------------------------------------------*/
function nextUnvisitedIndex(schedule, bundleKey, visited) {
  for (let i = 0; i < schedule.length; i++) {
    if (!visited[`${bundleKey}-${schedule[i].spot.id}`]) return i;
  }
  return Math.max(0, schedule.length - 1);
}

function TravelDayMode({ dayBundles, hotel, flightDay, timeOverrides, visitedStops, onToggleVisited, dayIdx, setDayIdx, onExit }) {
  const bundle = dayBundles[dayIdx];
  if (!bundle || bundle.spots.length === 0) return null;

  const schedule = scheduleForBundle(bundle, timeOverrides);
  const curIdx = nextUnvisitedIndex(schedule, bundle.key, visitedStops);
  const cur = schedule[curIdx];
  const next = schedule[curIdx + 1];
  const area = dayArea(bundle.spots);
  const transit = curIdx === 0 ? buildTransitRoute(hotel, area) : null;
  const dayDate = flightDay ? addDaysToDate(flightDay.date, dayIdx) : null;
  const weather = flightDay ? weatherForDay(flightDay.date, dayIdx) : null;
  const allVisited = schedule.every((row) => visitedStops[`${bundle.key}-${row.spot.id}`]);
  const navUrl = yandexNavUrl(SPOT_COORDS[cur.spot.id]);
  const Icon = cur.spot.Icon;

  return (
    <div className="animate-fadeUp mb-4">
      <div className="flex items-center justify-between mb-3">
        <button
          onClick={onExit}
          className="btn-press focus-ring flex items-center gap-1.5 text-xs rounded-full px-3 py-1.5"
          style={{ background: T.tileTint, color: T.tile }}
        >
          <RotateCcw size={12} /> برگشت به برنامه کامل
        </button>
        {weather && (
          <div className="flex items-center gap-1 text-xs" style={{ color: T.inkSoft }}>
            <weather.Icon size={14} style={{ color: T.gold }} />
            <span className="font-mono">{weather.temp}°</span>
            <span>{weather.label}</span>
          </div>
        )}
      </div>

      <div className="flex gap-1.5 overflow-x-auto pb-1 mb-2">
        {dayBundles.map((b, i) => {
          const active = i === dayIdx;
          const bSchedule = scheduleForBundle(b, timeOverrides);
          const bDone = bSchedule.length > 0 && bSchedule.every((row) => visitedStops[`${b.key}-${row.spot.id}`]);
          return (
            <button
              key={b.key}
              onClick={() => setDayIdx(i)}
              className="btn-press focus-ring flex-shrink-0 rounded-full px-3 py-1.5 text-xs flex items-center gap-1 border"
              style={{
                background: active ? T.night : bDone ? T.tileTint : "transparent",
                color: active ? "white" : bDone ? T.tile : T.inkSoft,
                borderColor: active ? T.night : T.line,
              }}
            >
              {bDone && <Check size={11} />} روز {i + 1}
            </button>
          );
        })}
      </div>

      {dayDate && (
        <p className="text-[11px] mb-3" style={{ color: T.inkSoft }}>
          {dayDate.toLocaleDateString("fa-IR", { weekday: "long", day: "numeric", month: "long" })}
        </p>
      )}

      {transit && <div className="mb-3"><TransitRouteCard transit={transit} mapUrl={hotel ? yandexRouteUrl(hotel.area, area) : null} /></div>}

      {allVisited ? (
        <div className="rounded-3xl p-6 text-center" style={{ background: T.night, boxShadow: T.shadowLg }}>
          <div className="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3" style={{ background: T.gold }}>
            <Check size={22} color={T.night} strokeWidth={3} />
          </div>
          <p className="text-white text-sm mb-1">همه استاپ‌های امروز رو دیدی</p>
          <p className="text-white/60 text-xs mb-4">
            {dayIdx < dayBundles.length - 1 ? "هروقت آماده بودی، برو سراغ برنامه فردا." : "این آخرین روز برنامه‌ات بود — سفر خوبی داشته باشی."}
          </p>
          {dayIdx < dayBundles.length - 1 && (
            <button
              onClick={() => setDayIdx(dayIdx + 1)}
              className="btn-press focus-ring rounded-2xl px-4 py-2.5 text-sm inline-flex items-center gap-1.5"
              style={{ background: T.gold, color: T.night }}
            >
              برو به روز {dayIdx + 2} <ChevronLeft size={14} />
            </button>
          )}
        </div>
      ) : (
        <>
          <div className="rounded-3xl p-5 mb-3" style={{ background: T.night, boxShadow: T.shadowLg }}>
            <p className="text-[11px] font-mono mb-3" style={{ color: T.gold }}>استاپ {curIdx + 1} از {schedule.length}</p>
            <div className="flex items-center gap-3 mb-3">
              <div className="w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0" style={{ background: "rgba(255,255,255,0.1)" }}>
                <Icon size={22} style={{ color: T.gold }} />
              </div>
              <div className="min-w-0">
                <p className="text-white text-lg font-medium truncate">{cur.spot.name}</p>
                <p className="text-white/60 text-xs font-mono">{cur.start} تا {cur.end}</p>
              </div>
            </div>
            <p className="text-white/80 text-sm mb-4 leading-6">{cur.spot.note}</p>
            {cur.spot.ticket && (
              <div className="flex items-start gap-2 mb-4 p-2.5 rounded-xl" style={{ background: "rgba(255,255,255,0.08)" }}>
                <Ticket size={14} className="mt-0.5 flex-shrink-0" style={{ color: T.gold }} />

              {navUrl && (
                <a
                  href={navUrl}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="btn-press focus-ring flex-1 rounded-2xl py-3 flex items-center justify-center gap-2 text-sm font-medium"
                  style={{ background: T.gold, color: T.night }}
                >
                  <MapPin size={15} /> مسیر تا اینجا
                </a>
              )}
              <button
                onClick={() => onToggleVisited(bundle.key, cur.spot.id)}
                className="btn-press focus-ring flex-1 rounded-2xl py-3 flex items-center justify-center gap-2 text-sm"
                style={{ background: "rgba(255,255,255,0.12)", color: "white" }}
              >
                <Check size={15} /> دیدم، برو بعدی
              </button>
            </div>
          </div>

          {next && (
            <div className="rounded-2xl p-3 flex items-center gap-2" style={{ background: T.panel, border: `1px dashed ${T.line}` }}>
              <LegChip leg={next.leg} />
              <div className="min-w-0 flex-1 text-left">
                <p className="text-[9px] font-mono mb-0.5" style={{ color: T.inkSoft }}>استاپ بعدی</p>
                <p className="text-sm truncate">
                  {next.spot.name} <span className="font-mono text-xs" style={{ color: T.inkSoft }}>· {next.start}</span>
                </p>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------
   Story feed card — the site's core hook, shown inline (no click
   needed to "enter" it). Sized at a true 9:16 story/reel ratio so
   real photos or reels drop in and fill the frame edge-to-edge,
   exactly like Instagram. Until real media is attached, a gradient
   placeholder stands in. Each card autoplays on its own progress
   bar; scroll for the next spot, tap to nudge a frame forward/back.

   To go live with real content: give a spot's frame a `media` url
   (jpg/png/webp → shown as a photo, mp4/webm/mov → autoplays as a
   muted reel). Example:
     frames: [
       { caption: "...", media: "https://your-cdn.com/sultanahmet-1.jpg" },
       { caption: "...", media: "https://your-cdn.com/sultanahmet.mp4" },
     ]
------------------------------------------------------------------*/
const FRAME_MS = 3400;
const isVideoUrl = (url = "") => /\.(mp4|webm|mov)(\?|$)/i.test(url);

/* ---------------------------------------------------------------
   BEST-HOUR BAR — a 24-slice visual strip (Google "Popular Times"
   idea, redrawn in the strait palette) showing when a spot is at
   its best, layered under the text note. Always laid out left→right
   (chronological), independent of the page's RTL direction.
------------------------------------------------------------------*/
function BestHourBar({ range, label }) {
  if (!range) return null;
  const [start, end] = range;
  return (
    <div dir="ltr" className="mb-2">
      <div className="flex gap-[2px] h-[13px] mb-1">
        {Array.from({ length: 24 }).map((_, h) => {
          const inRange = start <= end ? h >= start && h < end : h >= start || h < end;
          return (
            <div
              key={h}
              className="flex-1 rounded-[2px]"
              style={{ background: inRange ? T.gold : "rgba(255,255,255,0.22)" }}
            />
          );
        })}
      </div>
      <div className="flex justify-between text-[9px] font-mono text-white/55">
        <span>0</span>
        <span>6</span>
        <span>12</span>
        <span>18</span>
        <span>24</span>
      </div>
    </div>
  );
}

function StoryFeedCard({ spot, active, onToggle }) {
  const [frame, setFrame] = useState(0);
  const [fill, setFill] = useState(false);
  const timerRef = useRef(null);
  const Icon = spot.Icon;
  const current = spot.frames[frame];
  const caption = typeof current === "string" ? current : current.caption;
  const media = typeof current === "string" ? null : current.media;

  useEffect(() => {
    setFill(false);
    const raf = requestAnimationFrame(() => setFill(true));
    clearTimeout(timerRef.current);
    // real video frames advance on their own "ended" event; only auto-timeout for photos/placeholders
    if (!media || !isVideoUrl(media)) {
      timerRef.current = setTimeout(() => {
        setFrame((f) => (f + 1) % spot.frames.length);
      }, FRAME_MS);
    }
    return () => { cancelAnimationFrame(raf); clearTimeout(timerRef.current); };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [frame]);

  const goTo = (i) => setFrame(((i % spot.frames.length) + spot.frames.length) % spot.frames.length);

  return (
    <div className="relative rounded-3xl overflow-hidden select-none w-full" style={{ aspectRatio: "9 / 16" }}>
      {/* real media, when attached — fills the 9:16 frame like an actual story/reel */}
      {media ? (
        isVideoUrl(media) ? (
          <video
            key={media}
            src={media}
            className="absolute inset-0 w-full h-full object-cover"
            autoPlay
            muted
            playsInline
            onEnded={() => setFrame((f) => (f + 1) % spot.frames.length)}
          />
        ) : (
          <img key={media} src={media} alt={spot.name} className="absolute inset-0 w-full h-full object-cover story-kenburns" />
        )
      ) : (
        <div
          key={frame}
          className={`absolute inset-0 pattern-${spot.pattern} story-kenburns`}
          style={{ background: `linear-gradient(150deg, ${spot.from}, ${spot.to})` }}
        />
      )}
      <div className="absolute inset-0" style={{ background: "linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.05) 24%, rgba(0,0,0,0.05) 58%, rgba(0,0,0,0.78) 100%)" }} />
      {!media && <Icon size={170} color="rgba(255,255,255,0.14)" className="absolute" style={{ bottom: "20%", left: "-8%" }} />}

      {/* tap zones — nudge the frame within this card only */}
      <button aria-label="فریم بعد" onClick={() => goTo(frame + 1)} className="absolute inset-y-0 right-0 w-[70%] z-10" />
      <button aria-label="فریم قبل" onClick={() => goTo(frame - 1)} className="absolute inset-y-0 left-0 w-[30%] z-10" />

      {/* top: progress + credit line */}
      <div className="absolute top-0 inset-x-0 z-20 p-4 pointer-events-none">
        <div className="flex gap-1.5 mb-3.5">
          {spot.frames.map((_, i) => (
            <div key={i} className="flex-1 h-[2px] rounded-full overflow-hidden" style={{ background: "rgba(255,255,255,0.3)" }}>
              <div
                className="h-full rounded-full"
                style={{
                  background: T.gold,
                  width: i < frame ? "100%" : i === frame && fill ? "100%" : "0%",
                  transition: i === frame ? `width ${FRAME_MS}ms linear` : "none",
                }}
              />
            </div>
          ))}
        </div>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style={{ background: "rgba(255,255,255,0.14)", border: "1px solid rgba(255,255,255,0.28)" }}>
              <Compass size={13} color="white" />
            </div>
            <span className="eyebrow-mono text-white/85 text-[10px]">گذرگاه</span>
          </div>
          <span className="eyebrow-mono text-white/70 text-[10px] px-2 py-1 rounded-full" style={{ background: "rgba(255,255,255,0.12)" }}>{spot.tag}</span>
        </div>
      </div>

      {/* caption */}
      <div className="absolute inset-x-0 z-20 px-5 pointer-events-none" style={{ bottom: "134px" }}>
        <div className="w-6 h-[2px] mb-2.5" style={{ background: T.gold }} />
        <p className="text-white text-lg font-medium leading-relaxed" style={{ textShadow: "0 2px 10px rgba(0,0,0,0.45)" }}>
          {caption}
        </p>
      </div>

      {/* footer */}
      <div className="absolute inset-x-0 bottom-0 z-20 p-4">
        {spot.bestHour && (
          <div className="flex items-center gap-1.5 mb-1.5 text-white/85 text-[11px] pointer-events-none">
            <Clock size={11} /> بهترین ساعت بازدید: <span className="font-mono">{spot.bestHourLabel}</span>
          </div>
        )}

          style={active ? { background: T.tile, color: "white" } : { background: "white", color: T.night, boxShadow: "0 4px 14px rgba(0,0,0,0.18)" }}

        </button>
      </div>
    </div>
  );
}


/* ---------------------------------------------------------------
   REEL DECK — a fanned "deck of stories" widget, distinct from the
   scrolling story feed above: 4 cards stacked on top of each other
   like a hand of cards / a stack of Instagram stories. Tap the front
   card and it flies off to reveal the next one underneath — built so
   real reels can be dropped in later with zero layout changes.

   To go live: give any entry a `media` url exactly like the story
   feed above (mp4/webm/mov autoplays muted+looped, jpg/png/webp shows
   as a photo):
     { id: "r1", media: "https://your-cdn.com/reel-1.mp4", caption: "...", tag: "ریلز" }
------------------------------------------------------------------*/
const REEL_DECK_DATA = [
  { id: "r1", media: null, caption: "پشت‌صحنه‌ی مسیرهایی که با داده برات می‌چینیم", tag: "ریلز", Icon: Compass, from: T.brandDeep, to: T.brand },
  { id: "r2", media: null, caption: "یه استوری تازه از استانبول، به‌زودی دقیقاً همین‌جا", tag: "استوری", Icon: Camera, from: T.tileDeep, to: T.tile },
  { id: "r3", media: null, caption: "لحظه‌های واقعی از انتخاب‌های هوشمند تیم تریپزا", tag: "ریلز", Icon: Sparkles, from: T.clay, to: T.brandDeep },
  { id: "r4", media: null, caption: "قسمت بعدی در راهه... منتظرمون بمون", tag: "استوری", Icon: Play, from: T.brand, to: T.tileDeep },
];

function ReelDeck() {
  const [order, setOrder] = useState(() => REEL_DECK_DATA.map((_, i) => i));
  const [flying, setFlying] = useState(false);
  const layers = order.slice(0, 4);
  const frontId = REEL_DECK_DATA[layers[0]].id;

  const advance = () => {
    if (flying) return;
    setFlying(true);
    setTimeout(() => {
      setOrder((o) => [...o.slice(1), o[0]]);
      setFlying(false);
    }, 320);
  };

  return (
    <div className="mt-1">
      <div className="relative w-full max-w-[210px] mx-auto" style={{ aspectRatio: "9 / 16" }}>
        {/* ambient glow — the bit of "special / cutting-edge" polish behind the stack */}
        <div
          className="absolute -inset-3 rounded-[32px] opacity-30 blur-xl pointer-events-none"
          style={{ background: `linear-gradient(135deg, ${T.brand}, ${T.tile})` }}
        />
        {layers.slice().reverse().map((dataIdx, revIdx) => {
          const depth = layers.length - 1 - revIdx; // 0 = front-most card
          const item = REEL_DECK_DATA[dataIdx];
          const isFront = depth === 0;
          const rot = [0, -7, 6, -3][depth] || 0;
          const dx = [0, -14, 16, 4][depth] || 0;
          const dy = depth * 8;
          const scale = 1 - depth * 0.05;
          const media = item.media;
          return (
            <div
              key={item.id}
              onClick={isFront ? advance : undefined}
              className="absolute inset-0 rounded-[26px] overflow-hidden transition-all duration-300 ease-out"
              style={{
                zIndex: 20 - depth,
                transform: isFront && flying
                  ? "translate(120%, -10px) rotate(16deg) scale(0.94)"
                  : `translate(${dx}px, ${dy}px) rotate(${rot}deg) scale(${scale})`,
                opacity: isFront && flying ? 0 : 1,
                boxShadow: depth === 0 ? T.shadowLg : "0 10px 24px -14px rgba(35,20,9,0.35)",
                border: depth === 0 ? "1px solid rgba(255,255,255,0.18)" : "1px solid rgba(255,255,255,0.08)",
                cursor: isFront ? "pointer" : "default",
              }}
            >
              {media ? (
                isVideoUrl(media) ? (
                  <video src={media} className="absolute inset-0 w-full h-full object-cover" autoPlay muted loop playsInline />
                ) : (
                  <img src={media} alt={item.caption} className="absolute inset-0 w-full h-full object-cover" />
                )
              ) : (
                <div className="absolute inset-0" style={{ background: `linear-gradient(150deg, ${item.from}, ${item.to})` }} />
              )}
              <div className="absolute inset-0" style={{ background: "linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.02) 38%, rgba(0,0,0,0.05) 60%, rgba(0,0,0,0.72) 100%)" }} />
              {!media && <item.Icon size={130} color="rgba(255,255,255,0.14)" className="absolute" style={{ bottom: "8%", left: "-6%" }} />}

              {isFront && (
                <>
                  <div className="absolute top-3 inset-x-3 flex items-center gap-1.5 z-10">
                    <span className="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: "rgba(255,255,255,0.16)", border: "1px solid rgba(255,255,255,0.3)" }}>
                      <item.Icon size={12} color="#fff" />
                    </span>
                    <span className="eyebrow-mono text-white/85 text-[10px]">{item.tag}</span>
                    <span className="mr-auto flex items-center gap-1 px-2 py-0.5 rounded-full text-[9px] text-white" style={{ background: "rgba(255,60,60,0.85)" }}>
                      <span className="w-1.5 h-1.5 rounded-full bg-white animate-pulse" />
                      زنده
                    </span>
                  </div>
                  <div className="absolute bottom-3 inset-x-3 z-10">
                    <div className="w-5 h-[2px] mb-2" style={{ background: T.gold }} />
                    <p className="text-white text-[12.5px] leading-relaxed" style={{ textShadow: "0 2px 8px rgba(0,0,0,0.45)" }}>
                      {item.caption}
                    </p>
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>

      <div className="flex items-center justify-center gap-1.5 mt-3">
        {REEL_DECK_DATA.map((item) => (
          <span
            key={item.id}
            className="rounded-full transition-all duration-300"
            style={{ width: item.id === frontId ? "14px" : "5px", height: "5px", background: item.id === frontId ? T.brand : T.line }}
          />
        ))}
      </div>
      <p className="text-center text-[10.5px] mt-1.5 flex items-center justify-center gap-1" style={{ color: T.inkSoft }}>
        <Play size={10} /> برای دیدن بعدی لمس کن
      </p>
    </div>
  );
}

export default function IstanbulTripPlanner() {
  const [activeDestination] = useState(() => DESTINATIONS.find((d) => d.active) || DESTINATIONS[0]);

  const [packingChecked, setPackingChecked] = useState({});
  const [actualCosts, setActualCosts] = useState({});
  const [trackingActuals, setTrackingActuals] = useState(false);
  const [travelMode, setTravelMode] = useState(false);
  const [travelDayIdx, setTravelDayIdx] = useState(0);
  const [visitedStops, setVisitedStops] = useState({});
  const genTimer = useRef(null);
  const flightDays = useRef(buildFlightDays()).current;
  const dayRefs = useRef({});
  const posterCanvasRef = useRef(null);

  const choosePersona = (p) => {
    setPersona(p.id);
    setInterests(p.interests);
    showToast(`علایقت رو بر اساس «${p.label}» تنظیم کردیم`);
  };

  const toggleSpot = (id) =>
    setSelectedIds((cur) => (cur.includes(id) ? cur.filter((s) => s !== id) : [...cur, id]));

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2600);
  };

  const buildFallback = (groups) => {
    const days = groups.map((chunk, i) => {
      const [m, a, e] = chunk;
      return {
        day: i + 1,
        title: dayArea(chunk),
        morning: `بازدید از ${m.name} — ${m.note}`,
        afternoon: a ? `سر بزنید به ${a.name} — ${a.note}` : "امروز رو آروم بگذرونید؛ یک روز بدون عجله هم لازمه.",
        evening: e ? `غروب را در ${e.name} تجربه کنید — ${e.note}` : "برای شام یک جای محلی همین نزدیکی رو امتحان کنید.",
        foodTip: "یک رستوران محلی همان محله را امتحان کنید؛ قیمت‌ها معمولاً پایین‌تر از مناطق توریستی‌ست.",
      };
    });
    return { days };
  };

  useEffect(() => {
    if (loading) {
      genTimer.current = setInterval(() => {
        setGenStepIdx((i) => (i + 1) % GEN_STEPS.length);
      }, 1100);
    }
    return () => clearInterval(genTimer.current);
  }, [loading]);

  useEffect(() => {
    if (itinerary && !selectedHotelId) {
      const recommended = sortedHotels(SPOTS.filter((s) => selectedIds.includes(s.id)))[0];
      if (recommended) setSelectedHotelId(recommended.id);

  // Combines the AI-written narrative (title/morning/afternoon/evening/foodTip)

  useEffect(() => {
    if (itinerary) {
      setDayBundles(
        itinerary.days.map((d, i) => ({
          key: `bundle-${i}`,
          title: d.title,
          morning: d.morning,

          spots: dayGroups[i] || [],

      );
      setTimeOverrides({});

      setDayBundles([]);

  }, [itinerary]);

  const reorderStopsInDay = (bundleKey, newSpots) => {
    setDayBundles((prev) => prev.map((b) => (b.key === bundleKey ? { ...b, spots: newSpots } : b)));
  };

  // One-tap route fix: nearest-neighbor from the hotel's area, per day.
  // bundleKey=null runs it across every day at once; a single key
  // fixes just that day (used inline on the backtrack warning).
  const optimizeRoutes = (bundleKey = null) => {

    setDayBundles((prev) =>
      prev.map((b) =>

    );

  const copyItinerary = async () => {

    const text = buildShareText({ dayBundles, hotel, flightDay, nights, destName: activeDestination.name });

      showToast("برنامه در کلیپ‌بورد کپی شد");
    } catch {
      try {
