<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>سفرساز شخصی</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: "Vazirmatn", sans-serif;
    background: #f5f7fa;
    color: #1e1e1e;
  }

  header {
    background: #0f3a52;
    color: white;
    padding: 70px 20px;
    text-align: center;
  }

  header h1 {
    font-size: 26px;
    margin-bottom: 15px;
  }

  header p {
    font-size: 15px;
    opacity: 0.85;
    max-width: 500px;
    margin: auto;
    line-height: 1.8;
  }

  .container {
    max-width: 900px;
    margin: -40px auto 0;
    padding: 20px;
  }

  .card {
    background: white;
    border-radius: 18px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
  }

  .feature {
    background: #f5f7fa;
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
  }

  .btn {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #2ecc71;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:hover {
    background: #27ae60;
  }

  .small {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.6;
  }

  @media(max-width:600px){
    .features {
      grid-template-columns: 1fr;
    }
  }
</style>

</head>

<body>

<header>
  <h1>✈️ سفر را خودت طراحی کن</h1>
  <p>
    ما تور آماده نمی‌فروشیم.  
    اینجا شما تصمیم می‌گیری کِی، کجا و چگونه سفر کنی.
  </p>
</header>

<div class="container">

  <div class="card">

    <h3>✨ امکانات سفرساز</h3>

    <div class="features">
      <div class="feature">📅 انتخاب تاریخ سفر</div>
      <div class="feature">📍 انتخاب مقصد دلخواه</div>
      <div class="feature">✈️ هوایی یا زمینی</div>
      <div class="feature">🏨 انتخاب اقامت</div>
      <div class="feature">🚖 نوع ترانسفر</div>
      <div class="feature">👤 سفر شخصی‌سازی شده</div>
    </div>

    <button class="btn" onclick="startTrip()">
      شروع طراحی سفر
    </button>

    <div class="small">
      تجربه جدید سفرسازی مدرن ✨
    </div>

  </div>

</div>

<script>
function startTrip() {
  window.location.href = "trip.html";
}
</script>

</body>
</html>
