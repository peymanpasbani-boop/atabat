<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>پوستر آموزش SSR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    background:#05100C;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Vazirmatn',sans-serif;
  }

  .stage{
    width:100%;
    max-width:480px;
    aspect-ratio:1080/1350;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:14px;
  }

  .poster{
    position:relative;
    width:100%;
    height:100%;
    background:
      radial-gradient(ellipse at 30% 0%, rgba(61,255,154,0.10), transparent 55%),
      linear-gradient(180deg,#081712 0%, #050D0A 60%, #040A08 100%);
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(61,255,154,0.12);
    color:#ECF3EE;
  }

  .scanlines{
    position:absolute; inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px
    );
    mix-blend-mode:multiply;
    pointer-events:none;
    z-index:5;
  }
  .vignette{
    position:absolute; inset:0;
    box-shadow:inset 0 0 160px rgba(0,0,0,0.65);
    pointer-events:none;
    z-index:6;
  }

  .code-bg{
    position:absolute;
    inset:0;
    padding:36px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    line-height:2.1;
    color:rgba(61,255,154,0.14);
    letter-spacing:0.3px;
    white-space:pre;
    z-index:1;
    direction:ltr;
    text-align:left;
  }

  .content{
    position:relative;
    z-index:10;
    height:100%;
    display:flex;
    flex-direction:column;
  }

  .eyebrow{
    margin:44px 40px 0 40px;
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    letter-spacing:1px;
    color:#3DFF9A;
    direction:ltr;
  }
  .eyebrow .dot{
    width:7px;height:7px;border-radius:50%;
    background:#3DFF9A;
    box-shadow:0 0 8px 2px rgba(61,255,154,0.7);
  }
  .eyebrow .tag{
    color:rgba(236,243,238,0.55);
  }

  .headline{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 40px;
  }
  .kicker{
    font-size:19px;
    font-weight:500;
    color:#FFB347;
    margin-bottom:14px;
  }
  .title{
    font-size:76px;
    font-weight:900;
    line-height:1.18;
    color:#F5FAF7;
    text-shadow:0 0 26px rgba(61,255,154,0.25);
  }
  .title .cursor{
    display:inline-block;
    width:14px;height:58px;
    background:#3DFF9A;
    margin-inline-start:8px;
    vertical-align:-8px;
    box-shadow:0 0 14px rgba(61,255,154,0.8);
    animation:blink 1.1s steps(2,start) infinite;
  }
  @keyframes blink{ 50%{opacity:0;} }

  .sub{
    margin-top:22px;
    font-size:23px;
    font-weight:400;
    color:rgba(236,243,238,0.72);
    max-width:560px;
    line-height:1.7;
  }
  .sub b{
    color:#3DFF9A;
    font-weight:700;
  }

  .snippet{
    margin-top:30px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    color:#3DFF9A;
    background:rgba(61,255,154,0.07);
    border:1px solid rgba(61,255,154,0.3);
    padding:12px 16px;
    border-radius:8px;
    direction:ltr;
    text-align:left;
    width:fit-content;
    max-width:100%;
  }
  .snippet .prompt{ color:#FFB347; }

  .tear{
    position:relative;
    height:0;
    margin:0 0;
  }
  .tear::before{
    content:"";
    position:absolute;
    left:-14px; right:-14px; top:-1px;
    height:2px;
    background:repeating-linear-gradient(to right, rgba(236,243,238,0.35) 0 10px, transparent 10px 20px);
  }
  .notch-l, .notch-r{
    position:absolute; top:calc(100% - 14px);
    width:28px; height:28px; border-radius:50%;
    background:#05100C;
    z-index:11;
  }

  .footer{
    position:relative;
    padding:26px 40px 34px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-top:1px dashed rgba(236,243,238,0.28);
  }
  .footer .brand{
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    letter-spacing:0.5px;
    color:rgba(236,243,238,0.85);
    direction:ltr;
  }
  .footer .brand b{ color:#3DFF9A; }
  .footer .barcode{
    display:flex;
    gap:3px;
    align-items:flex-end;
    height:26px;
  }
  .footer .barcode span{
    display:block;
    width:3px;
    background:rgba(61,255,154,0.55);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="poster" id="poster">

    <div class="code-bg" id="codebg"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="content">

      <div class="eyebrow">
        <span class="dot"></span>
        NIRA · RESERVATION SYSTEM
        <span class="tag">// آموزش</span>
      </div>

      <div class="headline">
        <div class="kicker">شناسنامه‌ی دیجیتال مسافر</div>
        <div class="title">کدهای<br>SSR<span class="cursor"></span></div>
        <div class="sub">وقتی اسم مسافر <b>کافی نیست</b>؛ سیستم نیرا هویت کامل او را با یک کد استاندارد می‌خواهد.</div>
        <div class="snippet"><span class="prompt">SSR:</span>ALL DOCS HK1/I//…</div>
      </div>

      <div class="tear">
        <div class="notch-l" style="left:-14px;"></div>
        <div class="notch-r" style="right:-14px;"></div>
      </div>

      <div class="footer">
        <div class="brand"><b>nirahelp</b>.ir</div>
        <div class="barcode" id="barcode"></div>
      </div>

    </div>
  </div>
</div>

<script>
  const lines = [
    "SSR:ALL DOCS HK1/I//1234567890//010190/M////P1",
    "SSR:ALL DOCS HK1/P/THR/A1234567/IRN/010190/F/300130/HASHEMI/SARA/P2",
    "SSR:WCHR HK1 - assistance in terminal",
    "SSR:WCHS HK1 - assistance to seat",
    "SSR:WCHC HK1 - full assistance required",
    "SSR:ALL DOCS HK1/I//0021458796//150322/MI////P3",
  ];
  const bg = document.getElementById('codebg');
  let out = '';
  for (let i=0;i<26;i++){ out += lines[i % lines.length] + '\n'; }
  bg.textContent = out;

  const bc = document.getElementById('barcode');
  for(let i=0;i<18;i++){
    const b = document.createElement('span');
    const h = 8 + Math.random()*18;
    b.style.height = h+'px';
    b.style.opacity = 0.4 + Math.random()*0.6;
    bc.appendChild(b);
  }
</script>

</body>
</html>
