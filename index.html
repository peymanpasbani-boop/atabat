<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>سفرساز شخصی</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
  }

  .container {
    padding: 60px 20px;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 20px;
  }

  p {
    font-size: 16px;
    line-height: 1.8;
    opacity: 0.9;
    max-width: 500px;
    margin: auto;
  }

  .card {
    margin-top: 30px;
    background: rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
  }

  button {
    margin-top: 30px;
    padding: 15px 25px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    background: #38bdf8;
    color: black;
    font-weight: bold;
  }

  button:hover {
    background: #0ea5e9;
  }

  .small {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.6;
  }
</style>

</head>

<body>

<div class="container">

  <h1>✈️ سفر را شما طراحی می‌کنید</h1>

  <p>
    ما دیگر تور آماده نمی‌فروشیم.  
    اینجا شما تصمیم می‌گیرید کِی بروید، کجا بروید و چگونه سفر کنید.
  </p>

  <div class="card">
    <p>
      🎯 انتخاب تاریخ سفر<br>
      📍 انتخاب مقصد<br>
      🚐 نوع رفت (هوایی / زمینی)<br>
      🏨 انتخاب اقامت<br>
      🚖 نوع ترانسفر
    </p>
  </div>

  <button onclick="startTrip()">شروع طراحی سفر</button>

  <div class="small">
    تجربه جدید سفرسازی شخصی ✨
  </div>

</div>

<script>
function startTrip() {
  window.location.href = "trip.html";
}
</script>

</body>
</html>
