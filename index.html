<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>گروه زیارتی آوان — طراحی سفر زیارتی</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --em:#0d3b2e;--em2:#134a3a;--em3:#1a5e49;
  --gold:#c9a84c;--goldL:#e8c97a;--goldP:rgba(201,168,76,.13);--goldB:rgba(201,168,76,.28);
  --cream:#f9f5ee;--creamD:#f0ead8;
  --td:#1a1a1a;--tm:#4a4a4a;--ts:#7a7a7a;
  --white:#ffffff;
  --r:14px;--rL:22px;
  --tr:all .38s cubic-bezier(.4,0,.2,1);
  --header-h:68px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:"Vazirmatn",sans-serif;background:var(--cream);color:var(--td);min-height:100vh;overflow-x:hidden}

/* ══ DECORATIVE CITY IDENTITY WORDS ══ */
.hero-step-outer{position:relative;max-width:640px;margin:0 auto;}
.city-identity-word{position:absolute;top:0;bottom:0;width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:10;overflow:visible;}
.city-identity-word.najaf-side{left:-68px;}
.city-identity-word.karbala-side{right:-68px;}
.city-id-line-top,.city-id-line-bottom{flex-shrink:0;width:1px;flex:1;}
.city-id-line-top{background:linear-gradient(180deg,transparent 0%,rgba(201,168,76,.25) 100%);}
.city-id-line-bottom{background:linear-gradient(180deg,rgba(201,168,76,.25) 0%,transparent 100%);}
.city-id-deco-top{width:36px;height:36px;flex-shrink:0;margin-bottom:6px;opacity:.3;animation:cityGlow 4s ease-in-out infinite;}
.city-id-deco-bottom{width:28px;height:28px;flex-shrink:0;margin-top:6px;opacity:.2;animation:cityGlow 4s ease-in-out infinite reverse;}
.city-identity-text{writing-mode:vertical-rl;text-orientation:mixed;font-family:"Vazirmatn",sans-serif;font-size:42px;font-weight:900;letter-spacing:.22em;user-select:none;position:relative;background:linear-gradient(180deg,rgba(201,168,76,.05) 0%,rgba(232,201,122,.5) 20%,rgba(255,225,110,.85) 45%,rgba(201,168,76,.6) 75%,rgba(201,168,76,.05) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 12px rgba(201,168,76,.45)) drop-shadow(0 0 28px rgba(201,168,76,.18));pointer-events:auto;cursor:default;transition:filter .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.4,0,.2,1);}
.najaf-side .city-identity-text{animation:floatNajaf 7s ease-in-out infinite;}
.karbala-side .city-identity-text{animation:floatKarbala 7s ease-in-out infinite;animation-delay:3.5s;}
.city-identity-word:hover .city-identity-text{filter:drop-shadow(0 0 22px rgba(255,220,80,.9)) drop-shadow(0 0 44px rgba(201,168,76,.6)) drop-shadow(0 0 60px rgba(201,168,76,.3));transform:scale(1.05);}
.city-particles{position:absolute;inset:-10px;pointer-events:none;overflow:visible;}
.city-particle{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(201,168,76,.7);animation:particleDrift 5s ease-in-out infinite;}
.city-particle:nth-child(1){left:6px;top:12%;animation-delay:0s;animation-duration:4.5s;opacity:.6;}
.city-particle:nth-child(2){left:38px;top:27%;animation-delay:.9s;animation-duration:5.2s;opacity:.4;width:2px;height:2px;}
.city-particle:nth-child(3){left:14px;top:52%;animation-delay:1.7s;animation-duration:6s;opacity:.5;}
.city-particle:nth-child(4){left:40px;top:68%;animation-delay:2.5s;animation-duration:4.8s;opacity:.35;width:2px;height:2px;}
.city-particle:nth-child(5){left:4px;top:80%;animation-delay:3.3s;animation-duration:5.5s;opacity:.55;}
.city-particle:nth-child(6){left:44px;top:42%;animation-delay:.5s;animation-duration:6.5s;opacity:.3;width:2px;height:2px;}
@keyframes floatNajaf{0%,100%{transform:translateY(0px) scale(1);}30%{transform:translateY(-13px) scale(1.01);}70%{transform:translateY(7px) scale(.99);}}
@keyframes floatKarbala{0%,100%{transform:translateY(0px) scale(1);}30%{transform:translateY(9px) scale(.99);}70%{transform:translateY(-13px) scale(1.01);}}
@keyframes particleDrift{0%,100%{transform:translateY(0) translateX(0);opacity:inherit;}25%{transform:translateY(-8px) translateX(3px);}50%{transform:translateY(-14px) translateX(-2px);opacity:.1;}75%{transform:translateY(-8px) translateX(4px);}}
@keyframes cityGlow{0%,100%{opacity:.22;transform:scale(1);}50%{opacity:.48;transform:scale(1.1);}}
@media(max-width:820px){.city-identity-word{display:none;}}

.floating-support{position:fixed;bottom:24px;right:20px;z-index:500;display:flex;flex-direction:column;align-items:center;gap:6px;}
.support-btn{width:52px;height:52px;background:linear-gradient(135deg,#25d366,#128c7e);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,.45),0 0 0 3px rgba(37,211,102,.15);transition:var(--tr);position:relative;text-decoration:none;}
.support-btn:hover{transform:scale(1.1);}
.support-btn svg{width:28px;height:28px;fill:white;}
.support-pulse{position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(37,211,102,.4);animation:pulse-ring 2.4s ease-out infinite;pointer-events:none;}
.support-label{font-size:9px;font-weight:700;color:rgba(0,0,0,.45);background:rgba(255,255,255,.85);padding:2px 7px;border-radius:100px;white-space:nowrap;}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.08);opacity:0}100%{transform:scale(1.08);opacity:0}}

.nav-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
.nav-modal-overlay.open{display:flex}
.nav-modal{background:var(--white);border-radius:var(--rL);max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeUp .3s ease;overflow:hidden}
.nav-modal-head{background:linear-gradient(135deg,var(--em),var(--em3));padding:18px 20px;display:flex;align-items:center;justify-content:space-between}
.nav-modal-title{font-size:14px;font-weight:800;color:var(--goldL)}
.nav-modal-close{width:28px;height:28px;background:rgba(255,255,255,.12);border:none;border-radius:50%;cursor:pointer;color:rgba(255,255,255,.7);font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.nav-modal-close:hover{background:rgba(255,255,255,.22)}
.nav-modal-body{padding:20px 22px 24px;font-size:13px;color:var(--tm);line-height:2}

.locked-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;display:none;align-items:center;justify-content:center;padding:20px;}
.locked-modal-overlay.show{display:flex;}
.locked-modal{background:var(--white);border-radius:22px;max-width:360px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.22);animation:lockedPop .35s cubic-bezier(.34,1.56,.64,1) both;overflow:hidden;}
@keyframes lockedPop{from{opacity:0;transform:scale(.88) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
.locked-modal-head{background:linear-gradient(135deg,#2d1b00,#5a3a00);padding:18px 20px;text-align:center;}
.locked-modal-icon{font-size:38px;margin-bottom:8px;}
.locked-modal-title{font-size:14px;font-weight:800;color:#f5c842;}
.locked-modal-body{padding:18px 22px 22px;text-align:center;}
.locked-modal-text{font-size:13px;color:var(--tm);line-height:1.9;margin-bottom:16px;}
.locked-modal-btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--em),var(--em3));color:var(--goldL);font-family:"Vazirmatn",sans-serif;font-size:12.5px;font-weight:700;padding:10px 22px;border-radius:100px;border:none;cursor:pointer;}
.locked-modal-dismiss{display:block;margin:10px auto 0;font-size:11.5px;color:var(--ts);background:none;border:none;cursor:pointer;font-family:"Vazirmatn",sans-serif;}

.site-header{background:linear-gradient(160deg,var(--em) 0%,#0f4535 45%,#1a5e49 100%);position:sticky;top:0;z-index:200;border-bottom:1px solid var(--goldB);}
.header-inner{max-width:1100px;margin:0 auto;padding:0 22px;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;gap:16px;}
.logo-area{display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo-dome svg{width:42px;height:42px;filter:drop-shadow(0 2px 12px rgba(201,168,76,.4))}
.logo-main{font-size:16px;font-weight:800;color:var(--goldL);line-height:1.2;}
.logo-sub{font-size:9px;color:rgba(232,201,122,.55);margin-top:2px;letter-spacing:.06em;font-weight:500;}
.header-nav{display:flex;align-items:center;gap:2px}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border:none;background:transparent;cursor:pointer;border-radius:10px;transition:background .2s;color:rgba(255,255,255,.5);text-decoration:none;}
.nav-btn:hover{background:rgba(255,255,255,.07);color:var(--goldL)}
.nav-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-btn span{font-size:9px;font-family:"Vazirmatn",sans-serif;font-weight:600}

.hero{background:linear-gradient(155deg,var(--em) 0%,var(--em2) 55%,#1c6650 100%);padding:48px 24px 0;position:relative;overflow:hidden;}
.hero-glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,.07) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.hero-inner{max-width:700px;margin:0 auto;text-align:center;position:relative;z-index:1;}
.hero-badge{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--goldB);background:rgba(201,168,76,.09);color:var(--goldL);font-size:11px;font-weight:600;padding:5px 16px;border-radius:100px;margin-bottom:16px;animation:fadeUp .5s ease both}
.hero-title{font-size:clamp(28px,5vw,50px);font-weight:900;color:var(--goldL);line-height:1.2;margin-bottom:4px;animation:fadeUp .45s .05s ease both;}
.hero-title em{font-style:normal;background:linear-gradient(90deg,#ffe084,var(--gold),#e8c97a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-group-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.1em;animation:fadeUp .5s .08s ease both;margin-bottom:20px;}
.hero-slogan{font-size:clamp(16px,2.8vw,22px);font-weight:700;color:rgba(255,255,255,.9);line-height:1.7;margin-bottom:10px;animation:fadeUp .55s .12s ease both;}
.hero-slogan .hl{background:linear-gradient(90deg,var(--goldL),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-desc{font-size:12.5px;color:rgba(255,255,255,.6);line-height:1.9;max-width:560px;margin:0 auto 28px;animation:fadeUp .55s .16s ease both;}

.hero-step-wrap{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.25);border-radius:24px 24px 0 0;padding:24px 28px 32px;animation:fadeUp .6s .22s ease both;backdrop-filter:blur(8px);position:relative;z-index:1;}
.hero-step-progress{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:22px;}
.hsp-item{display:flex;align-items:center;gap:0;}
.hsp-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;transition:all .3s;flex-shrink:0;}
.hsp-dot.active{background:linear-gradient(135deg,var(--gold),#a8722a);color:var(--em);box-shadow:0 2px 10px rgba(201,168,76,.4);}
.hsp-dot.pending{background:rgba(255,255,255,.12);color:rgba(255,255,255,.4);border:1.5px solid rgba(255,255,255,.15);}
.hsp-dot.done{background:rgba(26,94,73,.5);color:var(--goldL);border:1.5px solid rgba(201,168,76,.3);}
.hsp-line{width:32px;height:2px;background:rgba(255,255,255,.1);flex-shrink:0;}
.hsp-line.done-line{background:rgba(201,168,76,.35);}
.hero-step-label{font-size:13px;font-weight:700;color:var(--goldL);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.hero-step-label .step-badge{background:rgba(201,168,76,.15);border:1px solid var(--goldB);color:var(--gold);font-size:10px;padding:2px 9px;border-radius:100px;font-weight:700;}

.origin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
.origin-card{border:1.5px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 8px 12px;cursor:pointer;transition:all .28s cubic-bezier(.4,0,.2,1);background:rgba(255,255,255,.05);text-align:center;position:relative;overflow:hidden;}
.origin-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.0),rgba(201,168,76,.08));opacity:0;transition:opacity .28s;}
.origin-card:hover::before,.origin-card.selected::before{opacity:1;}
.origin-card:hover{border-color:rgba(201,168,76,.45);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.2);}
.origin-card.selected{border-color:var(--gold);background:rgba(201,168,76,.12);box-shadow:0 6px 20px rgba(201,168,76,.25),inset 0 0 0 1px rgba(201,168,76,.2);}
.origin-card-icon{margin-bottom:8px;display:flex;align-items:center;justify-content:center;}
.origin-card-icon svg{width:32px;height:32px;transition:transform .28s;}
.origin-card:hover .origin-card-icon svg,.origin-card.selected .origin-card-icon svg{transform:scale(1.08);}
.origin-card-name{font-size:12px;font-weight:800;color:rgba(255,255,255,.8);letter-spacing:.02em;}
.origin-card-badge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;margin-top:5px;}
.origin-card-badge.air{background:rgba(13,59,46,.55);color:#7effd4;border:1px solid rgba(100,255,200,.2);}
.origin-card-badge.land{background:rgba(80,50,0,.55);color:#ffd580;border:1px solid rgba(255,200,80,.2);}
.origin-card-tick{position:absolute;top:7px;left:7px;width:16px;height:16px;background:linear-gradient(135deg,var(--gold),#a8722a);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:8px;color:var(--em);font-weight:800;}
.origin-card.selected .origin-card-tick{display:flex;}
.more-cities-label{font-size:10px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.3);text-transform:uppercase;margin:12px 0 8px;}
.more-cities-row{display:flex;flex-wrap:wrap;gap:6px;}
.city-pill-sm{padding:6px 14px;border-radius:100px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-size:11px;font-weight:600;color:rgba(255,255,255,.55);cursor:pointer;transition:all .22s;display:flex;align-items:center;gap:5px;}
.city-pill-sm:hover{border-color:rgba(201,168,76,.4);color:var(--goldL);background:rgba(201,168,76,.08);}
.city-pill-sm.selected{border-color:var(--gold);background:rgba(201,168,76,.14);color:var(--goldL);}
.city-pill-sm-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0;}
.hero-wave{display:block;line-height:0;margin-top:-1px;}
.hero-wave svg{display:block;width:100%}

.page-body{background:var(--cream);padding:0 0 60px;}
.page-body-inner{max-width:680px;margin:0 auto;padding:0 18px;}

.guided-flow{display:flex;flex-direction:column;gap:0;}
.gf-step{background:var(--white);border:1.5px solid rgba(201,168,76,.15);border-radius:20px;overflow:hidden;transition:var(--tr);margin-bottom:10px;box-shadow:0 2px 16px rgba(13,59,46,.05);}
.gf-step.active{border-color:rgba(201,168,76,.35);box-shadow:0 6px 28px rgba(13,59,46,.1);}
.gf-step.done{border-color:rgba(26,94,73,.25);background:var(--cream);}
.gf-step.locked{opacity:.6;pointer-events:none;}
.gf-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;}
.gf-step.done .gf-head:hover{background:rgba(201,168,76,.03);}
.gf-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;flex-shrink:0;transition:all .3s;}
.gf-step.active .gf-num{background:linear-gradient(135deg,var(--em),var(--em3));color:var(--goldL);box-shadow:0 3px 12px rgba(13,59,46,.25);}
.gf-step.done .gf-num{background:linear-gradient(135deg,var(--gold),#a8722a);color:var(--em);}
.gf-step.locked .gf-num{background:#e0d9c8;color:#aaa;}
.gf-meta{flex:1;}
.gf-title{font-size:13.5px;font-weight:800;color:var(--td);}
.gf-sub{font-size:11px;color:var(--ts);margin-top:2px;}
.gf-status{font-size:10.5px;font-weight:700;padding:3px 11px;border-radius:100px;flex-shrink:0;}
.gf-status.pending{color:var(--gold);background:var(--goldP);border:1px solid var(--goldB);}
.gf-status.done-st{color:var(--em3);background:rgba(26,94,73,.09);border:1px solid rgba(26,94,73,.2);}
.gf-status.locked-st{color:#aaa;background:#f0f0ec;border:1px solid #e0e0d8;}
.gf-chevron{font-size:9px;color:var(--ts);transition:transform .3s;flex-shrink:0;}
.gf-step.active .gf-chevron{transform:rotate(180deg);}
.gf-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1);}
.gf-step.active .gf-body{max-height:9000px;}
.gf-content{padding:4px 20px 24px;animation:fadeUp .3s ease both;}

.cal-label{font-size:12.5px;color:var(--tm);margin-bottom:12px;line-height:1.8;}
.month-slider-wrap{position:relative;overflow:hidden;margin-bottom:14px;}
.month-track{display:flex;transition:transform .38s cubic-bezier(.4,0,.2,1);}
.month-slide{min-width:100%;padding:0 2px;}
.month-slide-label{font-size:11px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.months-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.month-card{border:1.5px solid rgba(201,168,76,.16);border-radius:12px;padding:11px 6px;cursor:pointer;transition:all .22s;background:var(--cream);text-align:center;}
.month-card:hover{border-color:rgba(201,168,76,.38);transform:translateY(-1px);}
.month-card.selected{border-color:var(--gold);background:rgba(201,168,76,.12);box-shadow:0 3px 12px rgba(201,168,76,.18);}
.month-card-name{font-size:13px;font-weight:800;color:var(--td);}
.month-card.selected .month-card-name{color:var(--em);}
.month-card-year{font-size:9px;color:var(--ts);margin-top:1px;}
.days-slide-inner{padding:0;}
.days-slide-back{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--gold);cursor:pointer;margin-bottom:10px;padding:4px 0;}
.days-slide-back:hover{opacity:.75;}
.days-selected-month{font-size:13px;font-weight:700;color:var(--em);margin-bottom:11px;}
.days-grid-wrap{background:var(--cream);border:1px solid rgba(201,168,76,.18);border-radius:12px;padding:12px;}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-wd{text-align:center;font-size:9.5px;color:var(--ts);font-weight:600;padding:3px 0;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:8px;cursor:pointer;transition:background .15s,color .15s;color:var(--td);font-weight:500;min-height:32px;}
.cal-day:hover:not(.disabled):not(.empty){background:var(--goldP);color:var(--gold);}
.cal-day.selected{background:linear-gradient(135deg,var(--gold),#a8722a);color:var(--em);font-weight:700;box-shadow:0 2px 9px rgba(201,168,76,.26);}
.cal-day.empty{pointer-events:none;}
.cal-day.disabled{color:#ccc;pointer-events:none;opacity:.35;}
.cal-day.today-mark{border:1.5px solid var(--gold);color:var(--gold);font-weight:700;}

.pax-section{margin-top:20px;padding-top:18px;border-top:1px solid rgba(201,168,76,.13);}
.pax-section-title{font-size:12.5px;font-weight:700;color:var(--tm);margin-bottom:12px;}
.pax-cards-row{display:flex;gap:8px;flex-wrap:wrap;}
.pax-num-card{width:52px;height:52px;border-radius:14px;border:1.5px solid rgba(201,168,76,.2);background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .22s;}
.pax-num-card:hover{border-color:rgba(201,168,76,.45);transform:translateY(-2px);}
.pax-num-card.selected{border-color:var(--gold);background:rgba(201,168,76,.14);box-shadow:0 4px 14px rgba(201,168,76,.22);}
.pax-num-card-n{font-size:18px;font-weight:800;color:var(--em);line-height:1;}
.pax-num-card-lbl{font-size:8px;color:var(--ts);margin-top:1px;}
.pax-num-card.selected .pax-num-card-n{color:var(--gold);}
